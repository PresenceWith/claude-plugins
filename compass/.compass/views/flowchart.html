<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Compass — Pipeline Flowchart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { font-size: 20px; margin-bottom: 4px; text-align: center; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 28px; text-align: center; }
    .container { overflow-x: auto; width: 100%; max-width: 960px; }
    svg { width: 100%; height: auto; }

    .legend {
      display: flex;
      gap: 24px;
      margin-top: 24px;
      padding: 12px 20px;
      background: #1a1a2e;
      border-radius: 10px;
      border: 1px solid #2a2a4a;
      flex-wrap: wrap;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #a0a0b0;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .meta { color: #666; font-size: 11px; margin-top: 20px; text-align: right; width: 100%; max-width: 960px; }
  </style>
</head>
<body>
  <h1>Planning Compass — Pipeline</h1>
  <p class="subtitle">사용자 메시지 수신부터 응답 전달까지의 처리 흐름</p>

  <div class="container">
    <svg viewBox="0 0 900 760" preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id="arrow-main" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,0 10,4 0,8" fill="#facc15"/>
        </marker>
        <marker id="arrow-viz" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,0 10,4 0,8" fill="#6366f1"/>
        </marker>
        <marker id="arrow-int" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,0 10,4 0,8" fill="#f59e0b"/>
        </marker>
        <marker id="arrow-normal" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,0 10,4 0,8" fill="#4a4a7a"/>
        </marker>

        <filter id="glow-active" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#facc15" flood-opacity="0.15"/>
        </filter>
        <filter id="glow-indigo" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#6366f1" flood-opacity="0.12"/>
        </filter>
        <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#f59e0b" flood-opacity="0.12"/>
        </filter>
        <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4ade80" flood-opacity="0.2"/>
        </filter>
      </defs>

      <!-- ========== BACKGROUND REGIONS ========== -->
      <rect x="585" y="265" width="295" height="440" rx="14"
            fill="#6366f108" stroke="#6366f118" stroke-width="1"/>
      <rect x="15" y="385" width="290" height="380" rx="14"
            fill="#f59e0b08" stroke="#f59e0b18" stroke-width="1"/>

      <!-- Path labels -->
      <text x="732" y="282" text-anchor="middle" fill="#6366f1"
            font-size="11" font-weight="bold" letter-spacing="0.5">시각화 경로</text>
      <text x="160" y="402" text-anchor="middle" fill="#f59e0b"
            font-size="11" font-weight="bold" letter-spacing="0.5">프로세스 개입 경로</text>


      <!-- ========== ARROWS ========== -->

      <!-- Main flow (yellow) -->
      <line x1="440" y1="60" x2="440" y2="90"
            stroke="#facc15" stroke-width="2" marker-end="url(#arrow-main)"/>
      <line x1="440" y1="154" x2="440" y2="196"
            stroke="#facc15" stroke-width="2" marker-end="url(#arrow-main)"/>
      <line x1="440" y1="252" x2="440" y2="269"
            stroke="#facc15" stroke-width="2" marker-end="url(#arrow-main)"/>
      <!-- Diamond1 No → Diamond2 -->
      <line x1="440" y1="351" x2="440" y2="386"
            stroke="#facc15" stroke-width="2" marker-end="url(#arrow-main)"/>

      <!-- Diamond1 Yes → Viz path (indigo) -->
      <line x1="481" y1="310" x2="628" y2="310"
            stroke="#6366f1" stroke-width="2" marker-end="url(#arrow-viz)"/>

      <!-- Diamond2 Yes → Intervention path (amber) -->
      <line x1="396" y1="430" x2="262" y2="430"
            stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-int)"/>

      <!-- Diamond2 No → Normal (gray) -->
      <line x1="440" y1="474" x2="440" y2="526"
            stroke="#4a4a7a" stroke-width="2" marker-end="url(#arrow-normal)"/>

      <!-- Visualization path (indigo) -->
      <line x1="732" y1="334" x2="732" y2="372"
            stroke="#6366f1" stroke-width="2" marker-end="url(#arrow-viz)"/>
      <line x1="732" y1="432" x2="732" y2="470"
            stroke="#6366f1" stroke-width="2" marker-end="url(#arrow-viz)"/>
      <line x1="732" y1="526" x2="732" y2="564"
            stroke="#6366f1" stroke-width="2" marker-end="url(#arrow-viz)"/>
      <line x1="732" y1="608" x2="732" y2="644"
            stroke="#6366f1" stroke-width="2" marker-end="url(#arrow-viz)"/>

      <!-- Intervention path (amber) -->
      <line x1="160" y1="454" x2="160" y2="492"
            stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-int)"/>
      <line x1="160" y1="556" x2="160" y2="594"
            stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-int)"/>
      <line x1="160" y1="646" x2="160" y2="686"
            stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-int)"/>

      <!-- Normal path (gray) -->
      <line x1="440" y1="574" x2="440" y2="616"
            stroke="#4a4a7a" stroke-width="2" marker-end="url(#arrow-normal)"/>


      <!-- ========== BRANCH LABELS ========== -->
      <text x="516" y="302" text-anchor="start" fill="#6366f1" font-size="12" font-weight="bold">Yes</text>
      <text x="454" y="374" text-anchor="start" fill="#facc15" font-size="12" font-weight="bold">No</text>
      <text x="368" y="422" text-anchor="end" fill="#f59e0b" font-size="12" font-weight="bold">Yes</text>
      <text x="454" y="502" text-anchor="start" fill="#6b7280" font-size="12" font-weight="bold">No</text>


      <!-- ========== CENTER COLUMN ========== -->

      <!-- START -->
      <g>
        <rect x="340" y="20" width="200" height="40" rx="20"
              fill="#1a1a2e" stroke="#6366f1" stroke-width="2.5"/>
        <text x="440" y="40" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">사용자 메시지 수신</text>
      </g>

      <!-- BACKGROUND PRINCIPLES (always active, glowing) -->
      <g filter="url(#glow-active)">
        <rect x="270" y="90" width="340" height="64" rx="8"
              fill="#1a1a2e" stroke="#facc15" stroke-width="2"/>
        <!-- Always Active badge -->
        <rect x="540" y="96" width="58" height="16" rx="8" fill="#facc15"/>
        <text x="569" y="105" text-anchor="middle" dominant-baseline="central"
              fill="#0f0f1a" font-size="8" font-weight="bold">항상 활성</text>
        <text x="440" y="116" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">백그라운드 원칙 적용</text>
        <text x="440" y="138" text-anchor="middle" dominant-baseline="central"
              fill="#888" font-size="10">정보 제한 · 위치 고정 · 사전 요약 · 우선순위 분리 · 참여도 추적</text>
      </g>

      <!-- LIGHTWEIGHT STATE TRACKING (always active) -->
      <g filter="url(#glow-active)">
        <rect x="290" y="196" width="300" height="56" rx="8"
              fill="#1a1a2e" stroke="#facc15" stroke-width="2"/>
        <rect x="522" y="202" width="58" height="16" rx="8" fill="#facc15"/>
        <text x="551" y="211" text-anchor="middle" dominant-baseline="central"
              fill="#0f0f1a" font-size="8" font-weight="bold">항상 활성</text>
        <text x="440" y="218" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">경량 상태 추적 갱신</text>
        <text x="440" y="238" text-anchor="middle" dominant-baseline="central"
              fill="#888" font-size="10">결정 · 미결정 · 활성 주제 카운트</text>
      </g>

      <!-- DIAMOND 1: Visualization Request? -->
      <g>
        <rect x="411" y="281" width="58" height="58" rx="4"
              transform="rotate(45, 440, 310)"
              fill="#1a1a2e" stroke="#facc15" stroke-width="2.5"/>
        <text x="440" y="312" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="12" font-weight="bold">시각화 요청?</text>
      </g>

      <!-- DIAMOND 2: Diagnostic Threshold? -->
      <g>
        <rect x="409" y="399" width="62" height="62" rx="4"
              transform="rotate(45, 440, 430)"
              fill="#1a1a2e" stroke="#facc15" stroke-width="2.5"/>
        <text x="440" y="424" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="11" font-weight="bold">진단 임계값</text>
        <text x="440" y="440" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="11" font-weight="bold">초과?</text>
      </g>

      <!-- Threshold annotation -->
      <g opacity="0.75">
        <rect x="490" y="405" width="90" height="52" rx="5"
              fill="#0f0f1a" stroke="#facc1530" stroke-width="1"/>
        <text x="535" y="419" text-anchor="middle" fill="#facc15"
              font-size="8" font-weight="bold">임계값 조건</text>
        <text x="535" y="433" text-anchor="middle" fill="#888" font-size="8">미결정 ≥5 · 주제 ≥3</text>
        <text x="535" y="445" text-anchor="middle" fill="#888" font-size="8">개념 ≥5 · 수동적 응답</text>
      </g>

      <!-- NORMAL RESPONSE (dashed = fallback) -->
      <g>
        <rect x="350" y="526" width="180" height="48" rx="8"
              fill="#1a1a2e" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="440" y="552" text-anchor="middle" dominant-baseline="central"
              fill="#888" font-size="13">일반 응답 생성</text>
      </g>

      <!-- END: Normal -->
      <g filter="url(#glow-green)">
        <rect x="370" y="616" width="140" height="40" rx="20"
              fill="#1a1a2e" stroke="#4ade80" stroke-width="2.5"/>
        <text x="440" y="636" text-anchor="middle" dominant-baseline="central"
              fill="#4ade80" font-size="13" font-weight="bold">응답 전달</text>
      </g>


      <!-- ========== RIGHT COLUMN: VISUALIZATION PATH ========== -->

      <!-- State Sync -->
      <g>
        <rect x="632" y="286" width="200" height="48" rx="8"
              fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5"/>
        <text x="732" y="304" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">상태 동기화</text>
        <text x="732" y="322" text-anchor="middle" dominant-baseline="central"
              fill="#888" font-size="10">.compass/state.md 기록</text>
      </g>

      <!-- Type Selection -->
      <g>
        <rect x="602" y="372" width="260" height="60" rx="8"
              fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5"/>
        <text x="732" y="394" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">시각화 유형 선택</text>
        <text x="732" y="416" text-anchor="middle" dominant-baseline="central"
              fill="#888" font-size="10">마인드맵 · 대시보드 · 컨셉맵 · 플로우차트 ...</text>
      </g>

      <!-- Environment Detection & Rendering -->
      <g>
        <rect x="612" y="470" width="240" height="56" rx="8"
              fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5"/>
        <text x="732" y="490" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">환경 감지 & 렌더링</text>
        <text x="732" y="512" text-anchor="middle" dominant-baseline="central"
              fill="#888" font-size="10">Chrome MCP → Node.js → HTML 파일</text>
      </g>

      <!-- Visual Validation (optional, dashed) -->
      <g>
        <rect x="647" y="564" width="170" height="44" rx="8"
              fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,3"/>
        <rect x="752" y="568" width="44" height="14" rx="7" fill="#6b7280"/>
        <text x="774" y="576" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="7" font-weight="bold">선택적</text>
        <text x="720" y="588" text-anchor="middle" dominant-baseline="central"
              fill="#888" font-size="12">시각적 검증 (1회)</text>
      </g>

      <!-- END: Visualization -->
      <g filter="url(#glow-green)">
        <rect x="652" y="644" width="160" height="40" rx="20"
              fill="#1a1a2e" stroke="#4ade80" stroke-width="2.5"/>
        <text x="732" y="664" text-anchor="middle" dominant-baseline="central"
              fill="#4ade80" font-size="13" font-weight="bold">시각화 전달</text>
      </g>


      <!-- ========== LEFT COLUMN: INTERVENTION PATH ========== -->

      <!-- State Sync -->
      <g>
        <rect x="60" y="406" width="200" height="48" rx="8"
              fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="160" y="424" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">상태 동기화</text>
        <text x="160" y="442" text-anchor="middle" dominant-baseline="central"
              fill="#888" font-size="10">.compass/state.md 기록</text>
      </g>

      <!-- Intervention Type Selection -->
      <g>
        <rect x="30" y="492" width="260" height="64" rx="8"
              fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="160" y="516" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">개입 유형 선택</text>
        <text x="160" y="538" text-anchor="middle" dominant-baseline="central"
              fill="#888" font-size="10">결정 정리 · 초점 좁히기 · 핵심 요약 · 주도권 반환</text>
      </g>

      <!-- Text-based Intervention Execution -->
      <g>
        <rect x="40" y="594" width="240" height="52" rx="8"
              fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="160" y="614" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">텍스트 기반 개입 실행</text>
        <text x="160" y="634" text-anchor="middle" dominant-baseline="central"
              fill="#888" font-size="10">대화 흐름 내 자연스럽게 전달</text>
      </g>

      <!-- END: Intervention -->
      <g filter="url(#glow-green)">
        <rect x="55" y="686" width="210" height="40" rx="20"
              fill="#1a1a2e" stroke="#4ade80" stroke-width="2.5"/>
        <text x="160" y="706" text-anchor="middle" dominant-baseline="central"
              fill="#4ade80" font-size="13" font-weight="bold">프로세스 개입 전달</text>
      </g>

    </svg>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:#facc15"></span> 메인 플로우</span>
    <span class="legend-item"><span class="legend-dot" style="background:#6366f1"></span> 시각화 경로</span>
    <span class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span> 프로세스 개입 경로</span>
    <span class="legend-item"><span class="legend-dot" style="background:#4a4a7a"></span> 기본 응답 경로</span>
  </div>

  <div class="meta">
    Planning Compass Pipeline · 2026-03-30
  </div>
</body>
</html>
