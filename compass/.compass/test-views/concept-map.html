<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Compass — Concept Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { font-size: 20px; margin-bottom: 4px; text-align: center; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; text-align: center; }
    .container { overflow-x: auto; width: 100%; max-width: 1100px; }
    svg { width: 100%; height: auto; }
    .legend {
      display: flex;
      gap: 24px;
      margin-top: 24px;
      padding: 12px 20px;
      background: #1a1a2e;
      border-radius: 10px;
      border: 1px solid #2a2a4a;
      flex-wrap: wrap;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #a0a0b0;
      white-space: nowrap;
    }
    .legend-line {
      width: 24px;
      height: 0;
      display: inline-block;
      flex-shrink: 0;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .tooltip {
      position: fixed;
      pointer-events: none;
      background: #1a1a2e;
      border: 1px solid #4a4a7a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #e2e8f0;
      max-width: 260px;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      line-height: 1.5;
    }
    .tooltip.visible { opacity: 1; }
    .meta { color: #666; font-size: 11px; margin-top: 20px; text-align: right; width: 100%; max-width: 1100px; }

    /* Hover interaction for nodes */
    .node-group { cursor: pointer; transition: filter 0.2s, transform 0.2s; }
    .node-group:hover { filter: brightness(1.15); transform: translateY(-1px); }
  </style>
</head>
<body>
  <h1>Planning Compass — Concept Map</h1>
  <p class="subtitle">SaaS 플랫폼 아키텍처 — 핵심 요소 간 관계 및 의존성</p>

  <div class="container">
    <svg viewBox="0 0 1060 720" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="glow-core" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="8" result="blur"/>
          <feFlood flood-color="#6366f1" flood-opacity="0.3" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="glow"/>
          <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feFlood flood-color="#4ade80" flood-opacity="0.25" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="glow"/>
          <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- Region gradients -->
        <linearGradient id="region-fe" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="region-be" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="region-data" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="region-infra" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#10b981" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#10b981" stop-opacity="0.02"/>
        </linearGradient>

        <!-- Arrow markers — bigger, bolder -->
        <marker id="arr-dep" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,1 10,4 0,7" fill="#f87171"/>
        </marker>
        <marker id="arr-flow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,1 10,4 0,7" fill="#facc15"/>
        </marker>
        <marker id="arr-comm" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,1 10,4 0,7" fill="#38bdf8"/>
        </marker>

        <!-- Animated dash for workflow edges -->
        <style>
          @keyframes dash-flow { to { stroke-dashoffset: -20; } }
          @keyframes dash-dep { to { stroke-dashoffset: -18; } }
          .edge-flow { animation: dash-flow 1.5s linear infinite; }
          .edge-dep { animation: dash-dep 2s linear infinite; }
        </style>
      </defs>

      <!-- ========== DOMAIN REGIONS ========== -->

      <!-- Frontend region -->
      <rect x="30" y="40" width="310" height="290" rx="16"
            fill="url(#region-fe)" stroke="#3b82f630" stroke-width="1.5"/>
      <!-- Region label with decorative line -->
      <line x1="80" y1="64" x2="140" y2="64" stroke="#3b82f640" stroke-width="1"/>
      <text x="185" y="68" text-anchor="middle"
            fill="#3b82f6" font-size="11" font-weight="700" letter-spacing="2" opacity="0.8">FRONTEND</text>
      <line x1="230" y1="64" x2="290" y2="64" stroke="#3b82f640" stroke-width="1"/>

      <!-- Backend region -->
      <rect x="375" y="40" width="310" height="290" rx="16"
            fill="url(#region-be)" stroke="#8b5cf630" stroke-width="1.5"/>
      <line x1="430" y1="64" x2="485" y2="64" stroke="#8b5cf640" stroke-width="1"/>
      <text x="530" y="68" text-anchor="middle"
            fill="#8b5cf6" font-size="11" font-weight="700" letter-spacing="2" opacity="0.8">BACKEND</text>
      <line x1="575" y1="64" x2="635" y2="64" stroke="#8b5cf640" stroke-width="1"/>

      <!-- Data region -->
      <rect x="720" y="40" width="310" height="290" rx="16"
            fill="url(#region-data)" stroke="#f59e0b30" stroke-width="1.5"/>
      <line x1="790" y1="64" x2="835" y2="64" stroke="#f59e0b40" stroke-width="1"/>
      <text x="875" y="68" text-anchor="middle"
            fill="#f59e0b" font-size="11" font-weight="700" letter-spacing="2" opacity="0.8">DATA</text>
      <line x1="910" y1="64" x2="960" y2="64" stroke="#f59e0b40" stroke-width="1"/>

      <!-- Infrastructure region -->
      <rect x="180" y="390" width="700" height="280" rx="16"
            fill="url(#region-infra)" stroke="#10b98130" stroke-width="1.5"/>
      <line x1="380" y1="416" x2="445" y2="416" stroke="#10b98140" stroke-width="1"/>
      <text x="530" y="420" text-anchor="middle"
            fill="#10b981" font-size="11" font-weight="700" letter-spacing="2" opacity="0.8">INFRASTRUCTURE</text>
      <line x1="615" y1="416" x2="680" y2="416" stroke="#10b98140" stroke-width="1"/>

      <!-- ========== EDGES ========== -->

      <!-- Workflow edges (yellow, solid with animated dash) — between core nodes -->
      <path d="M 258,148 L 418,148"
            stroke="#facc15" stroke-width="2.5" fill="none" opacity="0.75"
            stroke-dasharray="8,4" class="edge-flow" marker-end="url(#arr-flow)"/>
      <!-- Workflow label pill -->
      <rect x="308" y="130" width="60" height="18" rx="9" fill="#0f0f1a" stroke="#facc1540" stroke-width="0.5"/>
      <text x="338" y="143" text-anchor="middle" fill="#facc15" font-size="9" font-weight="600">요청 →</text>

      <path d="M 596,148 L 770,148"
            stroke="#facc15" stroke-width="2.5" fill="none" opacity="0.75"
            stroke-dasharray="8,4" class="edge-flow" marker-end="url(#arr-flow)"/>
      <rect x="648" y="130" width="70" height="18" rx="9" fill="#0f0f1a" stroke="#facc1540" stroke-width="0.5"/>
      <text x="683" y="143" text-anchor="middle" fill="#facc15" font-size="9" font-weight="600">데이터 →</text>

      <!-- Dependency edges (red, dashed) -->
      <!-- Frontend Auth UI → Backend Auth Service -->
      <path d="M 205,235 C 280,250 350,250 395,235"
            stroke="#f87171" stroke-width="2" stroke-dasharray="7,4" fill="none" opacity="0.6" marker-end="url(#arr-dep)"/>
      <rect x="265" y="241" width="68" height="18" rx="9" fill="#0f0f1a" stroke="#f8717130" stroke-width="0.5"/>
      <text x="299" y="254" text-anchor="middle" fill="#f87171" font-size="9" font-weight="500">인증 의존</text>

      <!-- Backend API → Kubernetes -->
      <path d="M 507,200 C 507,310 430,400 410,440"
            stroke="#f87171" stroke-width="2" stroke-dasharray="7,4" fill="none" opacity="0.55" marker-end="url(#arr-dep)"/>

      <!-- Database → Kubernetes -->
      <path d="M 859,200 C 880,340 700,420 660,445"
            stroke="#f87171" stroke-width="2" stroke-dasharray="7,4" fill="none" opacity="0.55" marker-end="url(#arr-dep)"/>

      <!-- Frontend Dashboard → CDN -->
      <path d="M 275,268 C 275,380 440,520 470,535"
            stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,4" fill="none" opacity="0.45" marker-end="url(#arr-dep)"/>

      <!-- Search → Message Queue -->
      <path d="M 950,268 C 955,400 740,530 720,540"
            stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,4" fill="none" opacity="0.45" marker-end="url(#arr-dep)"/>

      <!-- React App → Kubernetes -->
      <path d="M 140,190 C 120,350 240,420 310,450"
            stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,4" fill="none" opacity="0.45" marker-end="url(#arr-dep)"/>

      <!-- Communication edges (blue, dotted) — between sub-nodes -->
      <path d="M 205,230 C 270,275 360,275 395,230"
            stroke="#38bdf8" stroke-width="2" stroke-dasharray="3,4" fill="none" opacity="0.6" marker-end="url(#arr-comm)"/>
      <rect x="265" y="268" width="64" height="18" rx="9" fill="#0f0f1a" stroke="#38bdf830" stroke-width="0.5"/>
      <text x="297" y="281" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="500">API 호출</text>

      <path d="M 613,268 C 680,310 750,310 810,268"
            stroke="#38bdf8" stroke-width="2" stroke-dasharray="3,4" fill="none" opacity="0.6" marker-end="url(#arr-comm)"/>
      <rect x="676" y="302" width="72" height="18" rx="9" fill="#0f0f1a" stroke="#38bdf830" stroke-width="0.5"/>
      <text x="712" y="315" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="500">데이터 조회</text>

      <!-- ========== CORE NODES ========== -->

      <!-- React App -->
      <g class="node-group" data-tooltip="React SPA 앱 (결정됨)&#10;Next.js 14 기반, App Router 사용&#10;→ API Gateway에 의존">
        <g filter="url(#glow-core)">
          <rect x="80" y="90" width="178" height="72" rx="12"
                fill="#1a1a2e" stroke="#3b82f6" stroke-width="2.5"/>
          <rect x="80" y="90" width="178" height="5" rx="2.5" fill="#3b82f6" opacity="0.6"/>
        </g>
        <!-- Port dot (right) -->
        <circle cx="258" cy="148" r="4" fill="#3b82f6" opacity="0.5"/>
        <text x="169" y="128" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">React App</text>
        <text x="169" y="148" text-anchor="middle" fill="#4ade80" font-size="10">✓ Next.js 14 · App Router</text>
      </g>

      <!-- API Gateway -->
      <g class="node-group" data-tooltip="API Gateway (결정됨)&#10;Express + tRPC 기반&#10;모든 클라이언트 요청의 진입점">
        <g filter="url(#glow-core)">
          <rect x="418" y="90" width="178" height="72" rx="12"
                fill="#1a1a2e" stroke="#8b5cf6" stroke-width="2.5"/>
          <rect x="418" y="90" width="178" height="5" rx="2.5" fill="#8b5cf6" opacity="0.6"/>
        </g>
        <circle cx="418" cy="148" r="4" fill="#8b5cf6" opacity="0.5"/>
        <circle cx="596" cy="148" r="4" fill="#8b5cf6" opacity="0.5"/>
        <text x="507" y="128" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">API Gateway</text>
        <text x="507" y="148" text-anchor="middle" fill="#4ade80" font-size="10">✓ Express + tRPC</text>
      </g>

      <!-- Database -->
      <g class="node-group" data-tooltip="메인 데이터베이스 (결정됨)&#10;PostgreSQL 15&#10;모든 서비스에서 의존">
        <g filter="url(#glow-core)">
          <rect x="770" y="90" width="178" height="72" rx="12"
                fill="#1a1a2e" stroke="#f59e0b" stroke-width="2.5"/>
          <rect x="770" y="90" width="178" height="5" rx="2.5" fill="#f59e0b" opacity="0.6"/>
        </g>
        <circle cx="770" cy="148" r="4" fill="#f59e0b" opacity="0.5"/>
        <text x="859" y="128" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Database</text>
        <text x="859" y="148" text-anchor="middle" fill="#4ade80" font-size="10">✓ PostgreSQL 15</text>
      </g>

      <!-- ========== SUB-NODES ========== -->

      <!-- Frontend: Auth UI (undecided) -->
      <g class="node-group" data-tooltip="인증 UI 컴포넌트&#10;소셜 로그인 + 이메일 지원 여부 미결정">
        <rect x="55" y="200" width="150" height="55" rx="8"
              fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="130" y="223" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Auth UI</text>
        <text x="130" y="242" text-anchor="middle" fill="#facc15" font-size="10">소셜 로그인?</text>
      </g>

      <!-- Frontend: Dashboard (decided) -->
      <g class="node-group" data-tooltip="대시보드 컴포넌트 (결정됨)&#10;Recharts 기반 차트 렌더링">
        <rect x="215" y="200" width="120" height="55" rx="8"
              fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="275" y="223" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Dashboard</text>
        <text x="275" y="242" text-anchor="middle" fill="#4ade80" font-size="10">✓ Recharts</text>
      </g>

      <!-- Backend: Auth Service (undecided) -->
      <g class="node-group" data-tooltip="인증 서비스&#10;JWT vs Session 미결정&#10;Auth UI와 직접 통신">
        <rect x="395" y="200" width="140" height="55" rx="8"
              fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="465" y="223" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Auth Service</text>
        <text x="465" y="242" text-anchor="middle" fill="#facc15" font-size="10">JWT vs Session?</text>
      </g>

      <!-- Backend: Payment (decided) -->
      <g class="node-group" data-tooltip="결제 서비스 (결정됨)&#10;Stripe 연동 확정">
        <rect x="548" y="200" width="130" height="55" rx="8"
              fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
        <text x="613" y="223" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Payment</text>
        <text x="613" y="242" text-anchor="middle" fill="#4ade80" font-size="10">✓ Stripe</text>
      </g>

      <!-- Data: Cache (undecided) -->
      <g class="node-group" data-tooltip="캐시 레이어&#10;Redis vs Memcached 미결정">
        <rect x="740" y="200" width="140" height="55" rx="8"
              fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="810" y="223" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Cache</text>
        <text x="810" y="242" text-anchor="middle" fill="#facc15" font-size="10">Redis vs Memcached?</text>
      </g>

      <!-- Data: Search (decided) -->
      <g class="node-group" data-tooltip="검색 엔진 (결정됨)&#10;Elasticsearch 8 사용">
        <rect x="893" y="200" width="130" height="55" rx="8"
              fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="958" y="223" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Search</text>
        <text x="958" y="242" text-anchor="middle" fill="#4ade80" font-size="10">✓ Elasticsearch 8</text>
      </g>

      <!-- ========== INFRASTRUCTURE NODES ========== -->

      <!-- Kubernetes -->
      <g class="node-group" data-tooltip="컨테이너 오케스트레이션 (결정됨)&#10;AWS EKS 기반&#10;모든 서비스를 호스팅">
        <g filter="url(#glow-green)">
          <rect x="310" y="445" width="180" height="60" rx="10"
                fill="#1a1a2e" stroke="#10b981" stroke-width="2.5"/>
          <rect x="310" y="445" width="180" height="5" rx="2.5" fill="#10b981" opacity="0.5"/>
        </g>
        <text x="400" y="472" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Kubernetes</text>
        <text x="400" y="492" text-anchor="middle" fill="#4ade80" font-size="10">✓ AWS EKS</text>
      </g>

      <!-- CI/CD -->
      <g class="node-group" data-tooltip="CI/CD 파이프라인&#10;GitHub Actions vs GitLab CI 미결정">
        <rect x="530" y="445" width="180" height="60" rx="10"
              fill="#1a1a2e" stroke="#10b981" stroke-width="2" stroke-dasharray="6,3"/>
        <text x="620" y="472" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">CI/CD Pipeline</text>
        <text x="620" y="492" text-anchor="middle" fill="#facc15" font-size="10">GH Actions vs GitLab CI?</text>
      </g>

      <!-- Monitoring -->
      <g class="node-group" data-tooltip="모니터링 & 로깅 (결정됨)&#10;Datadog 사용">
        <rect x="220" y="538" width="160" height="52" rx="10"
              fill="#1a1a2e" stroke="#10b981" stroke-width="1.5"/>
        <text x="300" y="560" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Monitoring</text>
        <text x="300" y="578" text-anchor="middle" fill="#4ade80" font-size="10">✓ Datadog</text>
      </g>

      <!-- CDN -->
      <g class="node-group" data-tooltip="CDN (결정됨)&#10;CloudFront 사용">
        <rect x="420" y="538" width="140" height="52" rx="10"
              fill="#1a1a2e" stroke="#10b981" stroke-width="1.5"/>
        <text x="490" y="560" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">CDN</text>
        <text x="490" y="578" text-anchor="middle" fill="#4ade80" font-size="10">✓ CloudFront</text>
      </g>

      <!-- Message Queue -->
      <g class="node-group" data-tooltip="메시지 큐&#10;SQS vs RabbitMQ 미결정">
        <rect x="600" y="538" width="160" height="52" rx="10"
              fill="#1a1a2e" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="680" y="560" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Message Queue</text>
        <text x="680" y="578" text-anchor="middle" fill="#facc15" font-size="10">SQS vs RabbitMQ?</text>
      </g>

      <!-- ========== INSIGHT BOX ========== -->
      <rect x="40" y="445" width="170" height="106" rx="10"
            fill="#6366f10c" stroke="#6366f140" stroke-width="1.5"/>
      <text x="125" y="468" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="bold">핵심 인사이트</text>
      <line x1="56" y1="476" x2="194" y2="476" stroke="#6366f125" stroke-width="1"/>
      <text x="125" y="496" text-anchor="middle" fill="#c0c0d0" font-size="10">Auth Service가 핵심 허브:</text>
      <text x="125" y="514" text-anchor="middle" fill="#c0c0d0" font-size="10">4개 컴포넌트가 의존</text>
      <text x="125" y="540" text-anchor="middle" fill="#facc15" font-size="11" font-weight="700">→ 우선 결정 필요</text>

      <!-- ========== CONNECTION SUMMARY COUNTS ========== -->
      <!-- Small badge on Auth Service showing dependency count -->
      <circle cx="535" cy="200" r="10" fill="#f87171" opacity="0.9"/>
      <text x="535" y="204" text-anchor="middle" fill="white" font-size="8" font-weight="bold">4</text>

    </svg>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="legend-line" style="border-top: 2.5px solid #facc15"></span> 워크플로우</span>
    <span class="legend-item"><span class="legend-line" style="border-top: 2px dashed #f87171"></span> 의존성</span>
    <span class="legend-item"><span class="legend-line" style="border-top: 2px dotted #38bdf8"></span> 통신</span>
    <span class="legend-item"><span class="legend-dot" style="border: 2px solid #4ade80; background: #4ade8020"></span> 결정됨</span>
    <span class="legend-item"><span class="legend-dot" style="border: 2px dashed #facc15; background: transparent"></span> 미결정</span>
  </div>

  <div class="meta">
    SaaS Platform Architecture · Planning Compass · 2026-03-31
  </div>

  <div class="tooltip" id="tooltip"></div>
  <script>
    const tooltip = document.getElementById('tooltip');
    document.querySelectorAll('.node-group').forEach(node => {
      node.addEventListener('mouseenter', e => {
        const text = node.getAttribute('data-tooltip');
        if (!text) return;
        tooltip.innerHTML = text.replace(/\n/g, '<br>');
        tooltip.classList.add('visible');
      });
      node.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 16) + 'px';
        tooltip.style.top = (e.clientY + 16) + 'px';
      });
      node.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
    });
  </script>
</body>
