<!DOCTYPE html>
<html lang="ko">
<head>

  <title>Planning Compass — Hierarchy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { font-size: 20px; margin-bottom: 4px; text-align: center; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 28px; text-align: center; }
    .container { overflow-x: auto; width: 100%; max-width: 1100px; }
    svg { width: 100%; height: auto; }
    .node-group { cursor: pointer; }
    .node-group:hover rect { filter: brightness(1.1); }
    .legend {
      display: flex;
      gap: 24px;
      margin-top: 24px;
      padding: 12px 20px;
      background: #1a1a2e;
      border-radius: 10px;
      border: 1px solid #2a2a4a;
      flex-wrap: wrap;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #a0a0b0;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      display: inline-block;
      flex-shrink: 0;
    }
    .tooltip {
      position: fixed;
      pointer-events: none;
      background: #1a1a2e;
      border: 1px solid #4a4a7a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #e2e8f0;
      max-width: 260px;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      line-height: 1.5;
    }
    .tooltip.visible { opacity: 1; }
    .meta { color: #666; font-size: 11px; margin-top: 20px; text-align: right; width: 100%; max-width: 1100px; }
  </style>
</head>

  <div class="tooltip" id="tooltip"></div>
  <script>
    const tooltip = document.getElementById('tooltip');
    document.querySelectorAll('.node-group').forEach(node => {
      node.addEventListener('mouseenter', e => {
        const text = node.getAttribute('data-tooltip');
        if (!text) return;
        tooltip.innerHTML = text.replace(/\n/g, '<br>');
        tooltip.classList.add('visible');
      });
      node.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 16) + 'px';
        tooltip.style.top = (e.clientY + 16) + 'px';
      });
      node.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
    });
  </script>
