<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6개월 프로젝트 로드맵 타임라인</title>
<style>
  body {
    margin: 0; padding: 24px;
    background: #0f0f1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh;
  }
  .tl-tooltip {
    position: fixed; pointer-events: none; z-index: 100;
    background: #1a1a2eee; border: 1px solid #4a4a7a; border-radius: 10px;
    padding: 10px 14px; font-size: 13px; color: #e2e8f0;
    max-width: 280px; opacity: 0; transition: opacity 0.15s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
  }
  .tl-tooltip.visible { opacity: 1; }
</style>
</head>
<body>

<div style="overflow-x: auto; max-width: 960px; width: 100%;">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520"
       style="width: 100%; background: #0f0f1a;
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">

    <defs>
      <marker id="arrow-critical" viewBox="0 0 10 6" refX="10" refY="3"
              markerWidth="8" markerHeight="6" orient="auto">
        <path d="M0,0 L10,3 L0,6" fill="#facc15"/>
      </marker>
      <marker id="arrow-optional" viewBox="0 0 10 6" refX="10" refY="3"
              markerWidth="8" markerHeight="6" orient="auto">
        <path d="M0,0 L10,3 L0,6" fill="#6b7280"/>
      </marker>

      <filter id="glow-decided" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
        <feFlood flood-color="#4ade80" flood-opacity="0.35" result="color"/>
        <feComposite in="color" in2="blur" operator="in" result="shadow"/>
        <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-active" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
        <feFlood flood-color="#facc15" flood-opacity="0.4" result="color"/>
        <feComposite in="color" in2="blur" operator="in" result="shadow"/>
        <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <linearGradient id="grad-completed" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4ade80" stop-opacity="0.08"/>
        <stop offset="100%" stop-color="#4ade80" stop-opacity="0.02"/>
      </linearGradient>
      <linearGradient id="grad-active" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#facc15" stop-opacity="0.08"/>
        <stop offset="100%" stop-color="#facc15" stop-opacity="0.02"/>
      </linearGradient>
      <linearGradient id="grad-future-odd" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#6366f1" stop-opacity="0.07"/>
        <stop offset="100%" stop-color="#6366f1" stop-opacity="0.015"/>
      </linearGradient>
      <linearGradient id="grad-future-even" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.07"/>
        <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.015"/>
      </linearGradient>

      <style>
        .milestone-group { cursor: pointer; }
        .milestone-group:hover .ms-dot-outer { transform: scale(1.15); }
        .milestone-group:hover .ms-name { fill: #ffffff !important; }

        .dep-arrow { transition: stroke-opacity 0.3s; }
        .dep-arrow.dimmed { stroke-opacity: 0.05 !important; }
        .dep-arrow.highlighted { stroke-opacity: 0.9 !important; }

        .milestone-group {
          opacity: 0; animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(6px); }
          to   { opacity: 1; transform: translateY(0); }
        }
      </style>
    </defs>

    <!--
      LAYOUT v3: Wider phase segments, bigger milestones, clearer labels
      Phase widths: 2ms → 140, 3ms → 180. Total = 960
      spineY = 250 (more headroom for above labels)
      SVG height = 520 (room for detail card + legend below)
    -->

    <!-- ===== PHASE BACKGROUNDS ===== -->
    <!-- 1월 Completed -->
    <rect x="0" y="0" width="140" height="520" fill="url(#grad-completed)" stroke="#4ade8020" stroke-width="1.5"/>
    <text x="70" y="26" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="bold">1월</text>
    <rect x="32" y="33" width="76" height="18" rx="9" fill="#4ade8018" stroke="#4ade8040"/>
    <text x="70" y="45" text-anchor="middle" fill="#94a3b8" font-size="10">4주 · 완료</text>
    <line x1="140" y1="0" x2="140" y2="520" stroke="#2a2a4a" stroke-width="1.5" stroke-dasharray="4,4"/>

    <!-- 2월 Completed -->
    <rect x="140" y="0" width="180" height="520" fill="url(#grad-completed)" stroke="#4ade8020" stroke-width="1.5"/>
    <text x="230" y="26" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="bold">2월</text>
    <rect x="192" y="33" width="76" height="18" rx="9" fill="#4ade8018" stroke="#4ade8040"/>
    <text x="230" y="45" text-anchor="middle" fill="#94a3b8" font-size="10">4주 · 완료</text>
    <line x1="320" y1="0" x2="320" y2="520" stroke="#2a2a4a" stroke-width="1.5" stroke-dasharray="4,4"/>

    <!-- 3월 Active -->
    <rect x="320" y="0" width="140" height="520" fill="url(#grad-active)" stroke="#facc1520" stroke-width="1.5"/>
    <text x="390" y="26" text-anchor="middle" fill="#facc15" font-size="15" font-weight="bold">3월</text>
    <rect x="346" y="33" width="88" height="18" rx="9" fill="#facc1518" stroke="#facc1540"/>
    <text x="390" y="45" text-anchor="middle" fill="#94a3b8" font-size="10">4주 · 진행중</text>
    <line x1="460" y1="0" x2="460" y2="520" stroke="#2a2a4a" stroke-width="1.5" stroke-dasharray="4,4"/>

    <!-- 4월 Future -->
    <rect x="460" y="0" width="180" height="520" fill="url(#grad-future-odd)"/>
    <text x="550" y="26" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">4월</text>
    <rect x="518" y="33" width="64" height="18" rx="9" fill="#6366f118" stroke="#6366f140"/>
    <text x="550" y="45" text-anchor="middle" fill="#94a3b8" font-size="10">4주</text>
    <line x1="640" y1="0" x2="640" y2="520" stroke="#2a2a4a" stroke-width="1.5" stroke-dasharray="4,4"/>

    <!-- 5월 Future -->
    <rect x="640" y="0" width="180" height="520" fill="url(#grad-future-even)"/>
    <text x="730" y="26" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">5월</text>
    <rect x="698" y="33" width="64" height="18" rx="9" fill="#8b5cf618" stroke="#8b5cf640"/>
    <text x="730" y="45" text-anchor="middle" fill="#94a3b8" font-size="10">4주</text>
    <line x1="820" y1="0" x2="820" y2="520" stroke="#2a2a4a" stroke-width="1.5" stroke-dasharray="4,4"/>

    <!-- 6월 Future -->
    <rect x="820" y="0" width="140" height="520" fill="url(#grad-future-odd)"/>
    <text x="890" y="26" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">6월</text>
    <rect x="858" y="33" width="64" height="18" rx="9" fill="#6366f118" stroke="#6366f140"/>
    <text x="890" y="45" text-anchor="middle" fill="#94a3b8" font-size="10">4주</text>

    <!-- ===== SPINE ===== -->
    <line x1="30" y1="250" x2="940" y2="250" stroke="#2a2a4a" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="250" x2="390" y2="250" stroke="#4ade80" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <circle cx="30" cy="250" r="5" fill="#4ade80" opacity="0.6"/>
    <polygon points="940,244 955,250 940,256" fill="#2a2a4a"/>

    <!-- ===== NOW MARKER ===== -->
    <line x1="390" y1="62" x2="390" y2="410" stroke="#facc15" stroke-width="1.5" stroke-dasharray="3,5" opacity="0.3"/>
    <rect x="366" y="58" width="48" height="22" rx="11" fill="#facc15"/>
    <text x="390" y="72" text-anchor="middle" dominant-baseline="central" fill="#0f0f1a" font-size="11" font-weight="bold">NOW</text>

    <!-- ===== DEPENDENCY ARROWS ===== -->
    <path class="dep-arrow" data-from="ms0" data-to="ms2"
          d="M 55 250 C 95 195, 135 195, 185 250"
          fill="none" stroke="#facc15" stroke-width="2.5" stroke-opacity="0.5"
          marker-end="url(#arrow-critical)"/>
    <path class="dep-arrow" data-from="ms2" data-to="ms5"
          d="M 185 250 C 240 195, 310 195, 362 250"
          fill="none" stroke="#facc15" stroke-width="2.5" stroke-opacity="0.5"
          marker-end="url(#arrow-critical)"/>
    <path class="dep-arrow" data-from="ms5" data-to="ms7"
          d="M 362 250 C 410 195, 460 195, 505 250"
          fill="none" stroke="#facc15" stroke-width="2.5" stroke-opacity="0.5"
          marker-end="url(#arrow-critical)"/>
    <path class="dep-arrow" data-from="ms7" data-to="ms10"
          d="M 505 250 C 560 195, 635 195, 685 250"
          fill="none" stroke="#facc15" stroke-width="2.5" stroke-opacity="0.5"
          marker-end="url(#arrow-critical)"/>
    <path class="dep-arrow" data-from="ms10" data-to="ms13"
          d="M 685 250 C 740 195, 800 195, 855 250"
          fill="none" stroke="#facc15" stroke-width="2.5" stroke-opacity="0.5"
          marker-end="url(#arrow-critical)"/>
    <!-- Optional: UI와이어프레임 → 프론트엔드MVP -->
    <path class="dep-arrow" data-from="ms4" data-to="ms6"
          d="M 275 250 C 310 300, 370 300, 418 250"
          fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3,5" stroke-opacity="0.35"
          marker-end="url(#arrow-optional)"/>

    <!-- ===== MILESTONES =====
      Phase positions:
        1월 (0-140): ms at 50, 105
        2월 (140-320): ms at 185, 230, 275
        3월 (320-460): ms at 362, 418
        4월 (460-640): ms at 505, 550, 595
        5월 (640-820): ms at 685, 730, 775
        6월 (820-960): ms at 855, 920

      Above label: stemY = -65, nameY = -75, descY = -58
      Below label: stemY = +65, nameY = +78, descY = +94
    -->

    <!-- #0: 요구사항 분석 (Decided, ABOVE) -->
    <g class="milestone-group" data-id="ms0" data-tooltip="요구사항 분석 완료<br/>기능 목록 및 사용자 시나리오 확정"
       transform="translate(55, 250)" style="animation-delay: 0.05s;">
      <line x1="0" y1="-14" x2="0" y2="-60" stroke="#4ade80" stroke-width="2" stroke-opacity="0.6"/>
      <g class="ms-dot-outer"><circle r="14" fill="#4ade80" filter="url(#glow-decided)"/></g>
      <text x="0" y="2" text-anchor="middle" dominant-baseline="central" fill="#0f0f1a" font-size="12" font-weight="bold">&#10003;</text>
      <text class="ms-name" x="0" y="-72" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">요구사항 분석</text>
      <text x="0" y="-58" text-anchor="middle" fill="#94a3b8" font-size="10">기능 목록 확정</text>
    </g>

    <!-- #1: 기술 스택 확정 (Decided, BELOW) -->
    <g class="milestone-group" data-id="ms1" data-tooltip="기술 스택 확정<br/>React, Node.js, PostgreSQL 선정"
       transform="translate(105, 250)" style="animation-delay: 0.1s;">
      <line x1="0" y1="14" x2="0" y2="60" stroke="#4ade80" stroke-width="2" stroke-opacity="0.6"/>
      <g class="ms-dot-outer"><circle r="14" fill="#4ade80" filter="url(#glow-decided)"/></g>
      <text x="0" y="2" text-anchor="middle" dominant-baseline="central" fill="#0f0f1a" font-size="12" font-weight="bold">&#10003;</text>
      <text class="ms-name" x="0" y="78" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">기술 스택 확정</text>
      <text x="0" y="94" text-anchor="middle" fill="#94a3b8" font-size="10">React + Node.js</text>
    </g>

    <!-- #2: DB 설계 (Decided, ABOVE) -->
    <g class="milestone-group" data-id="ms2" data-tooltip="DB 스키마 설계 완료<br/>ERD 작성 및 검토 완료"
       transform="translate(185, 250)" style="animation-delay: 0.15s;">
      <line x1="0" y1="-14" x2="0" y2="-60" stroke="#4ade80" stroke-width="2" stroke-opacity="0.6"/>
      <g class="ms-dot-outer"><circle r="14" fill="#4ade80" filter="url(#glow-decided)"/></g>
      <text x="0" y="2" text-anchor="middle" dominant-baseline="central" fill="#0f0f1a" font-size="12" font-weight="bold">&#10003;</text>
      <text class="ms-name" x="0" y="-72" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">DB 설계</text>
      <text x="0" y="-58" text-anchor="middle" fill="#94a3b8" font-size="10">ERD 확정</text>
    </g>

    <!-- #3: API 설계 (Decided, BELOW) -->
    <g class="milestone-group" data-id="ms3" data-tooltip="RESTful API 설계 완료<br/>OpenAPI 스펙 작성"
       transform="translate(230, 250)" style="animation-delay: 0.2s;">
      <line x1="0" y1="14" x2="0" y2="60" stroke="#4ade80" stroke-width="2" stroke-opacity="0.6"/>
      <g class="ms-dot-outer"><circle r="14" fill="#4ade80" filter="url(#glow-decided)"/></g>
      <text x="0" y="2" text-anchor="middle" dominant-baseline="central" fill="#0f0f1a" font-size="12" font-weight="bold">&#10003;</text>
      <text class="ms-name" x="0" y="78" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">API 설계</text>
      <text x="0" y="94" text-anchor="middle" fill="#94a3b8" font-size="10">OpenAPI 스펙</text>
    </g>

    <!-- #4: UI 와이어프레임 (Decided, ABOVE) -->
    <g class="milestone-group" data-id="ms4" data-tooltip="UI 와이어프레임 완료<br/>주요 화면 10개 설계"
       transform="translate(275, 250)" style="animation-delay: 0.25s;">
      <line x1="0" y1="-14" x2="0" y2="-60" stroke="#4ade80" stroke-width="2" stroke-opacity="0.6"/>
      <g class="ms-dot-outer"><circle r="14" fill="#4ade80" filter="url(#glow-decided)"/></g>
      <text x="0" y="2" text-anchor="middle" dominant-baseline="central" fill="#0f0f1a" font-size="12" font-weight="bold">&#10003;</text>
      <text class="ms-name" x="0" y="-72" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">UI 와이어프레임</text>
      <text x="0" y="-58" text-anchor="middle" fill="#94a3b8" font-size="10">주요 화면 설계</text>
    </g>

    <!-- #5: 백엔드 MVP (ACTIVE, BELOW) -->
    <g class="milestone-group" data-id="ms5" data-tooltip="백엔드 MVP 개발 진행 중<br/>핵심 API 구현 70% 완료"
       transform="translate(362, 250)" style="animation-delay: 0.3s;">
      <line x1="0" y1="18" x2="0" y2="60" stroke="#facc15" stroke-width="2" stroke-opacity="0.7"/>
      <circle r="24" fill="none" stroke="#facc15" stroke-width="1.5" stroke-opacity="0.2">
        <animate attributeName="r" values="22;28;22" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="0.2;0.06;0.2" dur="2s" repeatCount="indefinite"/>
      </circle>
      <g class="ms-dot-outer">
        <circle r="18" fill="#facc15" filter="url(#glow-active)">
          <animate attributeName="opacity" values="1;0.75;1" dur="2s" repeatCount="indefinite"/>
        </circle>
      </g>
      <text x="0" y="2" text-anchor="middle" dominant-baseline="central" fill="#0f0f1a" font-size="13" font-weight="bold">&#9654;</text>
      <text class="ms-name" x="0" y="78" text-anchor="middle" fill="#facc15" font-size="13" font-weight="bold">백엔드 MVP</text>
      <text x="0" y="94" text-anchor="middle" fill="#94a3b8" font-size="10">핵심 API 70%</text>
    </g>

    <!-- #6: 프론트엔드 MVP (Undecided, ABOVE) -->
    <g class="milestone-group" data-id="ms6" data-tooltip="프론트엔드 MVP<br/>React 컴포넌트 개발 예정"
       transform="translate(418, 250)" style="animation-delay: 0.35s;">
      <line x1="0" y1="-14" x2="0" y2="-60" stroke="#6b7280" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="3,3"/>
      <g class="ms-dot-outer"><circle r="14" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-dasharray="4,3"/></g>
      <text x="0" y="2" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-size="12">?</text>
      <text class="ms-name" x="0" y="-72" text-anchor="middle" fill="#94a3b8" font-size="12">프론트엔드 MVP</text>
      <text x="0" y="-58" text-anchor="middle" fill="#666666" font-size="10">React 개발</text>
    </g>

    <!-- #7: 통합 테스트 (Undecided, BELOW) -->
    <g class="milestone-group" data-id="ms7" data-tooltip="통합 테스트<br/>프론트엔드/백엔드 E2E 연동 테스트"
       transform="translate(505, 250)" style="animation-delay: 0.4s;">
      <line x1="0" y1="14" x2="0" y2="60" stroke="#6b7280" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="3,3"/>
      <g class="ms-dot-outer"><circle r="14" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-dasharray="4,3"/></g>
      <text x="0" y="2" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-size="12">?</text>
      <text class="ms-name" x="0" y="78" text-anchor="middle" fill="#94a3b8" font-size="12">통합 테스트</text>
      <text x="0" y="94" text-anchor="middle" fill="#666666" font-size="10">E2E 연동</text>
    </g>

    <!-- #8: 성능 최적화 (Undecided, ABOVE) -->
    <g class="milestone-group" data-id="ms8" data-tooltip="성능 최적화<br/>응답 시간, 쿼리 최적화, 캐시 전략"
       transform="translate(550, 250)" style="animation-delay: 0.45s;">
      <line x1="0" y1="-14" x2="0" y2="-60" stroke="#6b7280" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="3,3"/>
      <g class="ms-dot-outer"><circle r="14" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-dasharray="4,3"/></g>
      <text x="0" y="2" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-size="12">?</text>
      <text class="ms-name" x="0" y="-72" text-anchor="middle" fill="#94a3b8" font-size="12">성능 최적화</text>
      <text x="0" y="-58" text-anchor="middle" fill="#666666" font-size="10">쿼리 튜닝</text>
    </g>

    <!-- #9: 보안 감사 (Undecided, BELOW) -->
    <g class="milestone-group" data-id="ms9" data-tooltip="보안 감사<br/>OWASP 기준 취약점 점검 및 침투 테스트"
       transform="translate(595, 250)" style="animation-delay: 0.5s;">
      <line x1="0" y1="14" x2="0" y2="60" stroke="#6b7280" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="3,3"/>
      <g class="ms-dot-outer"><circle r="14" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-dasharray="4,3"/></g>
      <text x="0" y="2" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-size="12">?</text>
      <text class="ms-name" x="0" y="78" text-anchor="middle" fill="#94a3b8" font-size="12">보안 감사</text>
      <text x="0" y="94" text-anchor="middle" fill="#666666" font-size="10">OWASP 점검</text>
    </g>

    <!-- #10: 베타 출시 (Undecided, ABOVE) -->
    <g class="milestone-group" data-id="ms10" data-tooltip="베타 출시<br/>제한된 사용자에게 서비스 공개"
       transform="translate(685, 250)" style="animation-delay: 0.55s;">
      <line x1="0" y1="-14" x2="0" y2="-60" stroke="#6b7280" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="3,3"/>
      <g class="ms-dot-outer"><circle r="14" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-dasharray="4,3"/></g>
      <text x="0" y="2" text-anchor="middle" dominant-baseline="central" fill="#6b7280" font-size="12">?</text>
      <text class="ms-name" x="0" y="-72" text-anchor="middle" fill="#94a3b8" font-size="12">베타 출시</text>
      <text x="0" y="-58" text-anchor="middle" fill="#666666" font-size="10">제한 공개</text>

<div class="tl-tooltip"></div>

<script>
const tooltip = document.querySelector('.tl-tooltip');
const allArrows = document.querySelectorAll('.dep-arrow');
const allMilestones = document.querySelectorAll('.milestone-group');

allMilestones.forEach(ms => {
  const msId = ms.getAttribute('data-id');
  ms.addEventListener('mouseenter', e => {
    tooltip.innerHTML = ms.getAttribute('data-tooltip');
    tooltip.classList.add('visible');
    allArrows.forEach(arrow => {
      if (arrow.getAttribute('data-from') === msId || arrow.getAttribute('data-to') === msId) {
        arrow.classList.add('highlighted');
      } else {
        arrow.classList.add('dimmed');
      }
    });
  });
  ms.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
  });
  ms.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
    allArrows.forEach(a => a.classList.remove('highlighted', 'dimmed'));
  });
});
</script>
