<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Compass — 컨셉트맵</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
      min-height: 100vh;
    }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
    .meta { color: #666; font-size: 11px; margin-top: 24px; text-align: right; }

    .legend {
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #aaa;
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
    }
    .legend-line {
      width: 30px;
      height: 2px;
    }

    svg {
      display: block;
      margin: 0 auto;
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: #1e1e36;
      border: 1px solid #3a3a5c;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: #e2e8f0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      max-width: 220px;
    }
    .tooltip.visible { opacity: 1; }

    .edge-label {
      font-size: 10px;
      fill: #9ca3af;
      pointer-events: none;
    }

    .node-group { cursor: pointer; }
    .node-group:hover rect,
    .node-group:hover ellipse {
      filter: brightness(1.3);
    }
  </style>
</head>
<body>
  <h1>Planning Compass — 컨셉트맵</h1>
  <p class="subtitle">SaaS 플랫폼의 세 핵심 영역 간 관계와 의존성 구조</p>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background:#3b82f6;"></div>
      포트폴리오 영역
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#22c55e;"></div>
      커뮤니케이션 영역
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#f97316;"></div>
      견적/인보이스 영역
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#8b5cf6;"></div>
      인프라 (공유 의존성)
    </div>
    <div class="legend-item">
      <div class="legend-line" style="background:#facc15;"></div>
      워크플로우 흐름
    </div>
    <div class="legend-item">
      <div class="legend-line" style="background:#ef4444; border-top: 2px dashed #ef4444; height:0;"></div>
      의존성
    </div>
  </div>

  <svg width="1100" height="780" viewBox="0 0 1100 780">
    <defs>
      <!-- Arrow markers -->
      <marker id="arrow-flow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
        <polygon points="0 0, 10 3.5, 0 7" fill="#facc15"/>
      </marker>
      <marker id="arrow-dep" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
        <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
      </marker>
      <marker id="arrow-contains" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
        <polygon points="0 0, 8 3, 0 6" fill="#555"/>
      </marker>

      <!-- Glow filters -->
      <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feFlood flood-color="#3b82f6" flood-opacity="0.3"/>
        <feComposite in2="blur" operator="in"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feFlood flood-color="#22c55e" flood-opacity="0.3"/>
        <feComposite in2="blur" operator="in"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-orange" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feFlood flood-color="#f97316" flood-opacity="0.3"/>
        <feComposite in2="blur" operator="in"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- ======================== -->
    <!-- BACKGROUND REGION AREAS  -->
    <!-- ======================== -->
    <!-- Portfolio region -->
    <rect x="30" y="80" width="300" height="340" rx="16" fill="#3b82f610" stroke="#3b82f630" stroke-width="1"/>
    <text x="180" y="106" text-anchor="middle" fill="#3b82f680" font-size="11" font-weight="bold">포트폴리오 영역</text>

    <!-- Communication region -->
    <rect x="400" y="80" width="300" height="400" rx="16" fill="#22c55e10" stroke="#22c55e30" stroke-width="1"/>
    <text x="550" y="106" text-anchor="middle" fill="#22c55e80" font-size="11" font-weight="bold">커뮤니케이션 영역</text>

    <!-- Quote region -->
    <rect x="770" y="80" width="300" height="340" rx="16" fill="#f9731610" stroke="#f9731630" stroke-width="1"/>
    <text x="920" y="106" text-anchor="middle" fill="#f9731680" font-size="11" font-weight="bold">견적/인보이스 영역</text>

    <!-- ======================== -->
    <!-- WORKFLOW FLOW ARROWS     -->
    <!-- ======================== -->
    <!-- Portfolio -> Communication -->
    <path d="M 310 200 C 350 200, 360 200, 400 200" stroke="#facc15" stroke-width="2.5" fill="none" marker-end="url(#arrow-flow)"/>
    <text x="355" y="192" text-anchor="middle" class="edge-label" fill="#facc15" font-size="10" font-weight="bold">워크플로우</text>

    <!-- Communication -> Quotes -->
    <path d="M 680 200 C 720 200, 730 200, 770 200" stroke="#facc15" stroke-width="2.5" fill="none" marker-end="url(#arrow-flow)"/>
    <text x="725" y="192" text-anchor="middle" class="edge-label" fill="#facc15" font-size="10" font-weight="bold">워크플로우</text>

    <!-- ======================== -->
    <!-- CONTAINS EDGES (dimmed)  -->
    <!-- ======================== -->
    <!-- Portfolio sub-items -->
    <line x1="180" y1="230" x2="115" y2="270" stroke="#3b82f640" stroke-width="1" marker-end="url(#arrow-contains)"/>
    <line x1="180" y1="230" x2="180" y2="270" stroke="#3b82f640" stroke-width="1" marker-end="url(#arrow-contains)"/>
    <line x1="180" y1="230" x2="245" y2="270" stroke="#3b82f640" stroke-width="1" marker-end="url(#arrow-contains)"/>
    <line x1="180" y1="230" x2="180" y2="350" stroke="#3b82f640" stroke-width="1" marker-end="url(#arrow-contains)"/>

    <!-- Communication sub-items -->
    <line x1="550" y1="230" x2="470" y2="280" stroke="#22c55e40" stroke-width="1" marker-end="url(#arrow-contains)"/>
    <line x1="550" y1="230" x2="630" y2="280" stroke="#22c55e40" stroke-width="1" marker-end="url(#arrow-contains)"/>
    <line x1="550" y1="230" x2="470" y2="360" stroke="#22c55e40" stroke-width="1" marker-end="url(#arrow-contains)"/>
    <line x1="550" y1="230" x2="630" y2="360" stroke="#22c55e40" stroke-width="1" marker-end="url(#arrow-contains)"/>
    <line x1="550" y1="230" x2="550" y2="430" stroke="#22c55e40" stroke-width="1" marker-end="url(#arrow-contains)"/>

    <!-- Quote sub-items -->
    <line x1="920" y1="230" x2="860" y2="270" stroke="#f9731640" stroke-width="1" marker-end="url(#arrow-contains)"/>
    <line x1="920" y1="230" x2="980" y2="270" stroke="#f9731640" stroke-width="1" marker-end="url(#arrow-contains)"/>
    <line x1="920" y1="230" x2="860" y2="350" stroke="#f9731640" stroke-width="1" marker-end="url(#arrow-contains)"/>
    <line x1="920" y1="230" x2="980" y2="350" stroke="#f9731640" stroke-width="1" marker-end="url(#arrow-contains)"/>

    <!-- ======================== -->
    <!-- DEPENDENCY ARROWS        -->
    <!-- ======================== -->
    <!-- Portfolio -> File Storage -->
    <path d="M 180 420 C 180 520, 180 530, 300 620" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-dep)"/>
    <text x="200" y="550" class="edge-label" fill="#ef4444" font-size="10">depends-on</text>

    <!-- Communication -> Auth -->
    <path d="M 500 480 C 480 560, 480 580, 500 620" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-dep)"/>
    <text x="455" y="575" class="edge-label" fill="#ef4444" font-size="10">depends-on</text>

    <!-- Communication -> Notifications -->
    <path d="M 600 480 C 620 560, 620 580, 640 620" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-dep)"/>
    <text x="640" y="575" class="edge-label" fill="#ef4444" font-size="10">depends-on</text>

    <!-- Quotes -> Communication (dependency) -->
    <path d="M 920 250 Q 920 540, 750 560 Q 660 570, 600 480" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-dep)"/>
    <text x="790" y="530" class="edge-label" fill="#ef4444" font-size="10">depends-on</text>

    <!-- File Sharing -> File Storage -->
    <path d="M 630 310 C 630 500, 500 580, 400 620" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow-dep)"/>
    <text x="560" y="510" class="edge-label" fill="#ef444480" font-size="9">depends-on</text>

    <!-- Version Control -> File Storage -->
    <path d="M 470 390 C 430 500, 380 560, 360 620" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow-dep)"/>
    <text x="380" y="520" class="edge-label" fill="#ef444480" font-size="9">depends-on</text>


    <!-- ======================== -->
    <!-- CORE NODES (3 main areas) -->
    <!-- ======================== -->

    <!-- Portfolio Management (core) -->
    <g class="node-group" data-tooltip="포트폴리오 관리: 프로젝트 업로드, 퍼블릭 페이지, 비공개 링크, 조회 통계">
      <rect x="110" y="180" width="140" height="50" rx="10" fill="#1a1a2e" stroke="#3b82f6" stroke-width="2.5" filter="url(#glow-blue)"/>
      <text x="180" y="202" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">포트폴리오</text>
      <text x="180" y="219" text-anchor="middle" fill="#93c5fd" font-size="10">관리</text>
    </g>

    <!-- Client Communication (core) -->
    <g class="node-group" data-tooltip="클라이언트 커뮤니케이션: 프로젝트 채팅, 파일 공유, 버전 관리, 피드백, 승인 워크플로우">
      <rect x="480" y="180" width="140" height="50" rx="10" fill="#1a1a2e" stroke="#22c55e" stroke-width="2.5" filter="url(#glow-green)"/>
      <text x="550" y="202" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">클라이언트</text>
      <text x="550" y="219" text-anchor="middle" fill="#86efac" font-size="10">커뮤니케이션</text>
    </g>

    <!-- Quote/Invoice (core) -->
    <g class="node-group" data-tooltip="견적/인보이스 관리: 견적 생성, 템플릿, 온라인 서명, 인보이싱">
      <rect x="850" y="180" width="140" height="50" rx="10" fill="#1a1a2e" stroke="#f97316" stroke-width="2.5" filter="url(#glow-orange)"/>
      <text x="920" y="202" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">견적/인보이스</text>
      <text x="920" y="219" text-anchor="middle" fill="#fdba74" font-size="10">관리</text>
    </g>

    <!-- ======================== -->
    <!-- SUB-NODES: Portfolio      -->
    <!-- ======================== -->
    <g class="node-group" data-tooltip="프로젝트 파일을 업로드하고 관리">
      <rect x="55" y="270" width="120" height="34" rx="8" fill="#1a1a2e" stroke="#3b82f680" stroke-width="1.5"/>
      <text x="115" y="292" text-anchor="middle" fill="#93c5fd" font-size="11">프로젝트 업로드</text>
    </g>
    <g class="node-group" data-tooltip="공개 포트폴리오 페이지">
      <rect x="120" y="270" width="120" height="34" rx="8" fill="#1a1a2e" stroke="#3b82f680" stroke-width="1.5"/>
      <text x="180" y="292" text-anchor="middle" fill="#93c5fd" font-size="11">퍼블릭 페이지</text>
    </g>
    <g class="node-group" data-tooltip="비공개 링크로 특정 대상에게만 공유">
      <rect x="185" y="270" width="120" height="34" rx="8" fill="#1a1a2e" stroke="#3b82f680" stroke-width="1.5"/>
      <text x="245" y="292" text-anchor="middle" fill="#93c5fd" font-size="11">비공개 링크</text>
    </g>
    <g class="node-group" data-tooltip="포트폴리오 조회수 및 방문자 통계">
      <rect x="120" y="335" width="120" height="34" rx="8" fill="#1a1a2e" stroke="#3b82f680" stroke-width="1.5"/>
      <text x="180" y="357" text-anchor="middle" fill="#93c5fd" font-size="11">조회 통계</text>
    </g>

    <!-- ======================== -->
    <!-- SUB-NODES: Communication  -->
    <!-- ======================== -->
    <g class="node-group" data-tooltip="프로젝트 기반 실시간 채팅">
      <rect x="410" y="275" width="120" height="34" rx="8" fill="#1a1a2e" stroke="#22c55e80" stroke-width="1.5"/>
      <text x="470" y="297" text-anchor="middle" fill="#86efac" font-size="11">프로젝트 채팅</text>
    </g>
    <g class="node-group" data-tooltip="프로젝트 파일 공유 및 전송">
      <rect x="570" y="275" width="120" height="34" rx="8" fill="#1a1a2e" stroke="#22c55e80" stroke-width="1.5"/>
      <text x="630" y="297" text-anchor="middle" fill="#86efac" font-size="11">파일 공유</text>
    </g>
    <g class="node-group" data-tooltip="디자인 파일 버전 관리 및 이력 추적">
      <rect x="410" y="350" width="120" height="34" rx="8" fill="#1a1a2e" stroke="#22c55e80" stroke-width="1.5"/>
      <text x="470" y="372" text-anchor="middle" fill="#86efac" font-size="11">버전 관리</text>
    </g>
    <g class="node-group" data-tooltip="클라이언트 피드백 수집 및 관리">
      <rect x="570" y="350" width="120" height="34" rx="8" fill="#1a1a2e" stroke="#22c55e80" stroke-width="1.5"/>
      <text x="630" y="372" text-anchor="middle" fill="#86efac" font-size="11">피드백</text>
    </g>
    <g class="node-group" data-tooltip="단계별 승인 프로세스 관리">
      <rect x="490" y="425" width="120" height="34" rx="8" fill="#1a1a2e" stroke="#22c55e80" stroke-width="1.5"/>
      <text x="550" y="447" text-anchor="middle" fill="#86efac" font-size="11">승인 워크플로우</text>
    </g>

    <!-- ======================== -->
    <!-- SUB-NODES: Quote/Invoice  -->
    <!-- ======================== -->
    <g class="node-group" data-tooltip="견적서 생성 및 커스텀 구성">
      <rect x="800" y="270" width="120" height="34" rx="8" fill="#1a1a2e" stroke="#f9731680" stroke-width="1.5"/>
      <text x="860" y="292" text-anchor="middle" fill="#fdba74" font-size="11">견적 생성</text>
    </g>
    <g class="node-group" data-tooltip="재사용 가능한 견적/인보이스 템플릿">
      <rect x="920" y="270" width="120" height="34" rx="8" fill="#1a1a2e" stroke="#f9731680" stroke-width="1.5"/>
      <text x="980" y="292" text-anchor="middle" fill="#fdba74" font-size="11">템플릿</text>
    </g>
    <g class="node-group" data-tooltip="온라인으로 전자 서명 수집">
      <rect x="800" y="340" width="120" height="34" rx="8" fill="#1a1a2e" stroke="#f9731680" stroke-width="1.5"/>
      <text x="860" y="362" text-anchor="middle" fill="#fdba74" font-size="11">온라인 서명</text>
    </g>
    <g class="node-group" data-tooltip="인보이스 발행, 추적, 결제 관리">
      <rect x="920" y="340" width="120" height="34" rx="8" fill="#1a1a2e" stroke="#f9731680" stroke-width="1.5"/>
      <text x="980" y="362" text-anchor="middle" fill="#fdba74" font-size="11">인보이싱</text>
    </g>

    <!-- ======================== -->
    <!-- INFRASTRUCTURE NODES     -->
    <!-- ======================== -->
    <g class="node-group" data-tooltip="파일 저장, 관리, CDN 배포를 담당하는 인프라 컴포넌트. 포트폴리오와 커뮤니케이션 영역 모두가 의존.">
      <rect x="250" y="620" width="150" height="46" rx="10" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
      <text x="325" y="640" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold">파일 스토리지</text>
      <text x="325" y="656" text-anchor="middle" fill="#8b5cf680" font-size="9">미결정 (인프라)</text>
    </g>

    <g class="node-group" data-tooltip="사용자 인증 및 권한 관리. 클라이언트 커뮤니케이션의 핵심 의존성.">
      <rect x="440" y="620" width="140" height="46" rx="10" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
      <text x="510" y="640" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold">인증 시스템</text>
      <text x="510" y="656" text-anchor="middle" fill="#8b5cf680" font-size="9">미결정 (인프라)</text>
    </g>

    <g class="node-group" data-tooltip="이메일, 푸시, 인앱 알림 등. 클라이언트 커뮤니케이션의 핵심 의존성.">
      <rect x="610" y="620" width="140" height="46" rx="10" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
      <text x="680" y="640" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold">알림 시스템</text>
      <text x="680" y="656" text-anchor="middle" fill="#8b5cf680" font-size="9">미결정 (인프라)</text>
    </g>

    <!-- ======================== -->
    <!-- INFO ANNOTATION          -->
    <!-- ======================== -->
    <g transform="translate(40, 710)">
      <text fill="#555" font-size="11">
        <tspan x="0" dy="0">실선 테두리 = 결정됨 | 점선 테두리 = 미결정 | 노란 화살표 = 워크플로우 흐름 | 빨간 점선 = 의존성</tspan>
      </text>
    </g>
  </svg>

  <div class="meta">
    Last updated: 2026-03-29 · Planning Compass
  </div>

  <!-- Tooltip logic -->
  <div class="tooltip" id="tooltip"></div>
  <script>
    const tooltip = document.getElementById('tooltip');
    document.querySelectorAll('.node-group').forEach(node => {
      node.addEventListener('mouseenter', e => {
        const text = node.getAttribute('data-tooltip');
        if (!text) return;
        tooltip.textContent = text;
        tooltip.classList.add('visible');
      });
      node.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top = (e.clientY + 14) + 'px';
      });
      node.addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
      });
    });
  </script>
</body>
</html>
