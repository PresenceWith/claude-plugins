<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venn Diagram - Frontend vs Backend Skills</title>
<style>
  body { margin: 0; padding: 20px; background: #0a0a14; display: flex; justify-content: center; }
</style>
</head>
<body>
<div style="overflow-x: auto;">
  <svg width="100%" viewBox="0 0 960 650"
       preserveAspectRatio="xMidYMid meet"
       style="background: #0f0f1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
    <defs>
      <radialGradient id="grad-fe" cx="40%" cy="45%" r="55%">
        <stop offset="0%" stop-color="#f472b6" stop-opacity="0.22"/>
        <stop offset="60%" stop-color="#f472b6" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#f472b6" stop-opacity="0.04"/>
      </radialGradient>
      <radialGradient id="grad-be" cx="60%" cy="45%" r="55%">
        <stop offset="0%" stop-color="#34d399" stop-opacity="0.22"/>
        <stop offset="60%" stop-color="#34d399" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#34d399" stop-opacity="0.04"/>
      </radialGradient>
      <radialGradient id="grad-overlap" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.06"/>
      </radialGradient>

      <filter id="glow-fe" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
        <feFlood flood-color="#f472b6" flood-opacity="0.15" result="color"/>
        <feComposite in="color" in2="blur" operator="in" result="shadow"/>
        <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-be" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
        <feFlood flood-color="#34d399" flood-opacity="0.15" result="color"/>
        <feComposite in="color" in2="blur" operator="in" result="shadow"/>
        <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-shared" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
        <feFlood flood-color="#fbbf24" flood-opacity="0.2" result="color"/>
        <feComposite in="color" in2="blur" operator="in" result="shadow"/>
        <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="card-shadow">
        <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
      </filter>

      <clipPath id="clip-overlap">
        <circle cx="290" cy="280" r="195"/>
      </clipPath>

      <style>
        .venn-set { cursor: pointer; transition: opacity 0.3s; }
        .venn-item {
          cursor: pointer; transition: transform 0.2s ease, filter 0.2s;
          opacity: 0; animation: vennItemIn 0.4s ease-out forwards;
        }
        .venn-item:hover { transform: scale(1.06); filter: brightness(1.2) drop-shadow(0 3px 8px rgba(0,0,0,0.4)); }
        @keyframes vennCircleIn {
          from { opacity: 0; r: 175; }
          to { opacity: 1; r: 195; }
        }
        .venn-circle-anim { opacity: 0; animation: vennCircleIn 0.6s ease-out forwards; }
        @keyframes vennItemIn {
          from { opacity: 0; transform: translateY(6px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes countFadeIn { from { opacity: 0; } to { opacity: 1; } }
        .region-count {
          font-size: 36px; font-weight: bold; fill-opacity: 0.18;
          pointer-events: none;
          animation: countFadeIn 0.8s ease-out 0.3s forwards; opacity: 0;
        }
        .venn-tooltip {
          position: fixed; pointer-events: none; z-index: 100;
          background: #1a1a2eee; border: 1px solid #4a4a7a; border-radius: 10px;
          padding: 12px 16px; font-size: 12px; color: #e2e8f0;
          max-width: 280px; opacity: 0; transition: opacity 0.2s;
          box-shadow: 0 8px 32px rgba(0,0,0,0.5); backdrop-filter: blur(8px);
        }
        .venn-tooltip.visible { opacity: 1; }
        .venn-tooltip .tt-region { font-size: 10px; color: #888; margin-top: 6px; display: block; }
        .venn-tooltip .tt-status {
          display: inline-block; padding: 2px 8px; border-radius: 4px;
          font-size: 9px; font-weight: bold; margin-top: 4px;
        }
      </style>
    </defs>

    <!--
      Balanced test: 4 FE-only, 3 shared, 4 BE-only (no scope annotation)
      circle1 (FE): cx=290, cy=280, r=195
      circle2 (BE): cx=560, cy=280, r=195
      offset = 195 * 0.70 = 136.5 → centers at 290 and 560 (distance=270)
      leftOnlyCenter: (290 - 195*0.35, 280) = (222, 280)
      overlapCenter: (425, 280)
      rightOnlyCenter: (560 + 195*0.35, 280) = (628, 280)
    -->

    <!-- Circles -->
    <g class="venn-set" data-set="fe">
      <circle class="venn-circle-anim" cx="290" cy="280" r="195"
              fill="url(#grad-fe)" stroke="#f472b6" stroke-width="2" stroke-opacity="0.6"
              filter="url(#glow-fe)" style="animation-delay: 0s;"/>
      <circle cx="290" cy="280" r="185" fill="none"
              stroke="#f472b6" stroke-width="0.5" stroke-opacity="0.15"/>
    </g>
    <g class="venn-set" data-set="be">
      <circle class="venn-circle-anim" cx="560" cy="280" r="195"
              fill="url(#grad-be)" stroke="#34d399" stroke-width="2" stroke-opacity="0.6"
              filter="url(#glow-be)" style="animation-delay: 0.15s;"/>
      <circle cx="560" cy="280" r="185" fill="none"
              stroke="#34d399" stroke-width="0.5" stroke-opacity="0.15"/>
    </g>

    <!-- Overlap zone -->
    <circle cx="560" cy="280" r="195"
            fill="url(#grad-overlap)" clip-path="url(#clip-overlap)"/>

    <!-- Set labels -->
    <g class="set-label">
      <rect x="190" y="72" width="120" height="28"
            rx="8" fill="#f472b6" fill-opacity="0.12"
            stroke="#f472b6" stroke-opacity="0.3" stroke-width="1"/>
      <text x="250" y="90" text-anchor="middle" dominant-baseline="central"
            fill="#f472b6" font-size="15" font-weight="bold">프론트엔드</text>
      <text x="250" y="110" text-anchor="middle"
            fill="#f472b6" fill-opacity="0.5" font-size="11">7개 스킬</text>
    </g>
    <g class="set-label">
      <rect x="500" y="72" width="120" height="28"
            rx="8" fill="#34d399" fill-opacity="0.12"
            stroke="#34d399" stroke-opacity="0.3" stroke-width="1"/>
      <text x="560" y="90" text-anchor="middle" dominant-baseline="central"
            fill="#34d399" font-size="15" font-weight="bold">백엔드</text>
      <text x="560" y="110" text-anchor="middle"
            fill="#34d399" fill-opacity="0.5" font-size="11">7개 스킬</text>
    </g>

    <!-- Region count badges -->
    <text class="region-count" x="195" y="240"
          text-anchor="middle" dominant-baseline="central" fill="#f472b6">4</text>
    <text x="195" y="267" text-anchor="middle"
          fill="#f472b6" fill-opacity="0.35" font-size="11" font-weight="500">FE만</text>

    <text class="region-count" x="425" y="240"
          text-anchor="middle" dominant-baseline="central" fill="#fbbf24">3</text>
    <text x="425" y="267" text-anchor="middle"
          fill="#fbbf24" fill-opacity="0.35" font-size="11" font-weight="500">공통</text>

    <text class="region-count" x="655" y="240"
          text-anchor="middle" dominant-baseline="central" fill="#34d399">4</text>
    <text x="655" y="267" text-anchor="middle"
          fill="#34d399" fill-opacity="0.35" font-size="11" font-weight="500">BE만</text>

    <!-- Items: FE only -->
    <g class="venn-item" data-tooltip="React, Vue 등 프레임워크" data-region="FE만"
       data-status="decided" style="animation-delay: 0.3s;">
      <rect x="138" y="290" width="114" height="30" rx="7"
            fill="#1a1a2e" stroke="#f472b6" stroke-width="1.5" filter="url(#card-shadow)"/>
      <circle cx="244" cy="298" r="4" fill="#4ade80"/>
      <text x="195" y="306" text-anchor="middle" dominant-baseline="central"
            fill="#e2e8f0" font-size="11">UI 프레임워크</text>
    </g>
    <g class="venn-item" data-tooltip="CSS, Tailwind, Styled Components" data-region="FE만"
       data-status="decided" style="animation-delay: 0.4s;">
      <rect x="138" y="326" width="114" height="30" rx="7"
            fill="#1a1a2e" stroke="#f472b6" stroke-width="1.5" filter="url(#card-shadow)"/>
      <circle cx="244" cy="334" r="4" fill="#4ade80"/>
      <text x="195" y="342" text-anchor="middle" dominant-baseline="central"
            fill="#e2e8f0" font-size="11">스타일링</text>
    </g>
    <g class="venn-item" data-tooltip="반응형 디자인, 모바일 최적화" data-region="FE만"
       data-status="decided" style="animation-delay: 0.5s;">
      <rect x="138" y="362" width="114" height="30" rx="7"
            fill="#1a1a2e" stroke="#f472b6" stroke-width="1.5" filter="url(#card-shadow)"/>
      <circle cx="244" cy="370" r="4" fill="#4ade80"/>
      <text x="195" y="378" text-anchor="middle" dominant-baseline="central"
            fill="#e2e8f0" font-size="11">반응형 디자인</text>
    </g>
    <g class="venn-item" data-tooltip="접근성(A11y) 및 시맨틱 마크업" data-region="FE만"
       data-status="active" style="animation-delay: 0.6s;">
      <rect x="138" y="398" width="114" height="30" rx="7"
            fill="#1a1a2e" stroke="#f472b6" stroke-width="1.5" filter="url(#card-shadow)"/>
      <circle cx="244" cy="406" r="4" fill="#facc15"/>
      <text x="195" y="414" text-anchor="middle" dominant-baseline="central"
            fill="#e2e8f0" font-size="11">접근성</text>
    </g>

    <!-- Items: Shared -->
    <g class="venn-item shared" data-tooltip="JavaScript/TypeScript 기본기" data-region="공통"
       data-status="decided" style="animation-delay: 0.5s;">
      <rect x="367" y="290" width="116" height="30" rx="7"
            fill="#1e1a30" stroke="#fbbf24" stroke-width="2" filter="url(#glow-shared)"/>
      <circle cx="475" cy="298" r="4" fill="#4ade80"/>
      <text x="425" y="306" text-anchor="middle" dominant-baseline="central"
            fill="#e2e8f0" font-size="11" font-weight="bold">TypeScript</text>
    </g>
    <g class="venn-item shared" data-tooltip="Git 버전관리 및 코드리뷰" data-region="공통"
       data-status="decided" style="animation-delay: 0.6s;">
      <rect x="367" y="326" width="116" height="30" rx="7"
            fill="#1e1a30" stroke="#fbbf24" stroke-width="2" filter="url(#glow-shared)"/>
      <circle cx="475" cy="334" r="4" fill="#4ade80"/>
      <text x="425" y="342" text-anchor="middle" dominant-baseline="central"
            fill="#e2e8f0" font-size="11" font-weight="bold">Git</text>
    </g>
    <g class="venn-item shared" data-tooltip="REST API 설계 및 소비" data-region="공통"
       data-status="decided" style="animation-delay: 0.7s;">
      <rect x="367" y="362" width="116" height="30" rx="7"
            fill="#1e1a30" stroke="#fbbf24" stroke-width="2" filter="url(#glow-shared)"/>
      <circle cx="475" cy="370" r="4" fill="#4ade80"/>
      <text x="425" y="378" text-anchor="middle" dominant-baseline="central"
            fill="#e2e8f0" font-size="11" font-weight="bold">REST API</text>
    </g>

    <!-- Items: BE only -->
    <g class="venn-item" data-tooltip="PostgreSQL, MongoDB 등 DB 관리" data-region="BE만"
       data-status="decided" style="animation-delay: 0.5s;">
      <rect x="598" y="290" width="114" height="30" rx="7"
            fill="#1a1a2e" stroke="#34d399" stroke-width="1.5" filter="url(#card-shadow)"/>
      <circle cx="704" cy="298" r="4" fill="#4ade80"/>
      <text x="655" y="306" text-anchor="middle" dominant-baseline="central"
            fill="#e2e8f0" font-size="11">데이터베이스</text>
    </g>
    <g class="venn-item" data-tooltip="Docker, Kubernetes 배포" data-region="BE만"
       data-status="decided" style="animation-delay: 0.6s;">
      <rect x="598" y="326" width="114" height="30" rx="7"
            fill="#1a1a2e" stroke="#34d399" stroke-width="1.5" filter="url(#card-shadow)"/>
      <circle cx="704" cy="334" r="4" fill="#4ade80"/>
      <text x="655" y="342" text-anchor="middle" dominant-baseline="central"
            fill="#e2e8f0" font-size="11">인프라/배포</text>
    </g>
    <g class="venn-item" data-tooltip="인증/인가 및 보안" data-region="BE만"
       data-status="active" style="animation-delay: 0.7s;">
      <rect x="598" y="362" width="114" height="30" rx="7"
            fill="#1a1a2e" stroke="#34d399" stroke-width="1.5" filter="url(#card-shadow)"/>
      <circle cx="704" cy="370" r="4" fill="#facc15"/>
      <text x="655" y="378" text-anchor="middle" dominant-baseline="central"
            fill="#e2e8f0" font-size="11">보안/인증</text>
    </g>
    <g class="venn-item" data-tooltip="메시지 큐, 캐시 등 시스템 설계" data-region="BE만"
       data-status="active" style="animation-delay: 0.8s;">
      <rect x="598" y="398" width="114" height="30" rx="7"
            fill="#1a1a2e" stroke="#34d399" stroke-width="1.5" filter="url(#card-shadow)"/>
      <circle cx="704" cy="406" r="4" fill="#facc15"/>
      <text x="655" y="414" text-anchor="middle" dominant-baseline="central"
            fill="#e2e8f0" font-size="11">시스템 설계</text>
    </g>

    <!-- Summary stats bar (no scope annotation in this test) -->
    <g class="venn-summary" transform="translate(130, 520)">
      <rect x="0" y="0" width="560" height="52" rx="10"
            fill="#1a1a2e" stroke="#2a2a4a" stroke-width="1"/>
      <rect x="16" y="12" width="140" height="28" rx="6" fill="#f472b6" fill-opacity="0.08"/>
      <text x="30" y="29" fill="#f472b6" font-size="16" font-weight="bold">4</text>
      <text x="48" y="29" fill="#f472b6" fill-opacity="0.6" font-size="11">FE만</text>

      <rect x="172" y="12" width="170" height="28" rx="6" fill="#fbbf24" fill-opacity="0.1"/>
      <text x="186" y="29" fill="#fbbf24" font-size="16" font-weight="bold">3</text>
      <text x="204" y="29" fill="#fbbf24" fill-opacity="0.6" font-size="11">공통</text>
      <text x="248" y="29" fill="#fbbf24" fill-opacity="0.35" font-size="10">(27.3%)</text>

      <rect x="358" y="12" width="140" height="28" rx="6" fill="#34d399" fill-opacity="0.08"/>
      <text x="372" y="29" fill="#34d399" font-size="16" font-weight="bold">4</text>
      <text x="390" y="29" fill="#34d399" fill-opacity="0.6" font-size="11">BE만</text>

      <text x="520" y="29" fill="#666666" font-size="10">전체 11개</text>
    </g>

    <!-- Legend -->
    <g class="legend" transform="translate(770, 520)">
      <rect x="0" y="0" width="160" height="100" rx="10"
            fill="#1a1a2eee" stroke="#2a2a4a" stroke-width="1"/>
      <text x="14" y="20" fill="#888888" font-size="10" font-weight="bold">범례</text>
      <circle cx="22" cy="38" r="7" fill="#f472b6" fill-opacity="0.15" stroke="#f472b6" stroke-width="1.5"/>
      <text x="36" y="41" fill="#94a3b8" font-size="10">프론트엔드</text>
      <circle cx="22" cy="58" r="7" fill="#34d399" fill-opacity="0.15" stroke="#34d399" stroke-width="1.5"/>
      <text x="36" y="61" fill="#94a3b8" font-size="10">백엔드</text>
      <circle cx="22" cy="80" r="4" fill="#4ade80"/>
      <text x="32" y="83" fill="#94a3b8" font-size="10">결정됨</text>
      <circle cx="90" cy="80" r="4" fill="#facc15"/>
      <text x="100" y="83" fill="#94a3b8" font-size="10">논의 중</text>
    </g>
  </svg>
</div>

<div class="venn-tooltip"></div>

<script>
const tooltip = document.querySelector('.venn-tooltip');
document.querySelectorAll('.venn-item').forEach(item => {
  item.addEventListener('mouseenter', e => {
    const desc = item.getAttribute('data-tooltip');
    const region = item.getAttribute('data-region');
    const status = item.getAttribute('data-status');
    const statusLabel = { decided: '결정됨', active: '논의 중', undecided: '미결정' }[status] || '';
    const statusColor = { decided: '#4ade80', active: '#facc15', undecided: '#6b7280' }[status] || '#6b7280';
    tooltip.innerHTML = `${desc}<span class="tt-region">${region}</span>${statusLabel ? `<span class="tt-status" style="background:${statusColor}18;color:${statusColor}">${statusLabel}</span>` : ''}`;
    tooltip.classList.add('visible');
  });
  item.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
  });
  item.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
});
document.querySelectorAll('.venn-set').forEach(set => {
  set.addEventListener('mouseenter', () => {
    document.querySelectorAll('.venn-set').forEach(s => {
      if (s !== set) s.style.opacity = '0.3';
    });
  });
  set.addEventListener('mouseleave', () => {
    document.querySelectorAll('.venn-set').forEach(s => s.style.opacity = '');
  });
});
</script>
</body>
</html>
