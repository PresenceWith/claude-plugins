<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Compass — Flowchart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { font-size: 20px; margin-bottom: 4px; text-align: center; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 28px; text-align: center; }
    .container { overflow-x: auto; width: 100%; max-width: 1100px; }
    svg { width: 100%; height: auto; }
    .meta { color: #666; font-size: 11px; margin-top: 20px; text-align: right; width: 100%; max-width: 1100px; }

    .legend {
      display: flex;
      gap: 24px;
      margin-top: 24px;
      padding: 12px 20px;
      background: #1a1a2e;
      border-radius: 10px;
      border: 1px solid #2a2a4a;
      flex-wrap: wrap;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #a0a0b0;
      white-space: nowrap;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .flow-tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      background: #1a1a2eee;
      border: 1px solid #4a4a7a;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #e2e8f0;
      max-width: 280px;
      opacity: 0;
      transition: opacity 0.2s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
    }
    .flow-tooltip.visible { opacity: 1; }

    .flow-node, .flow-edge, .branch-label {
      opacity: 0;
      animation: flowFadeIn 0.35s ease-out forwards;
    }
    @keyframes flowFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .flow-node { cursor: pointer; transition: transform 0.2s ease; }
    .flow-node:hover { transform: scale(1.04); }
    .flow-edge { transition: stroke-opacity 0.3s; }
    .flow-edge.dimmed { stroke-opacity: 0.15; }
    .flow-edge.highlighted { stroke-opacity: 1; }
  </style>
</head>
<body>
  <h1>Planning Compass — Flowchart</h1>
  <p class="subtitle">사용자 회원가입 플로우</p>

  <div class="container">
    <svg width="100%" viewBox="0 0 760 960" preserveAspectRatio="xMidYMid meet"
         style="background: #0f0f1a;">
      <defs>
        <marker id="arrow-main" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,1 10,4 0,7" fill="#4ade80"/>
        </marker>
        <marker id="arrow-active" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,1 10,4 0,7" fill="#6366f1"/>
        </marker>
        <marker id="arrow-alt" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,1 10,4 0,7" fill="#6b7280"/>
        </marker>
        <marker id="arrow-error" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,1 10,4 0,7" fill="#f87171"/>
        </marker>

        <filter id="glow-active" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
          <feFlood flood-color="#facc15" flood-opacity="0.35" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-decided" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
          <feFlood flood-color="#4ade80" flood-opacity="0.3" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-indigo" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
          <feFlood flood-color="#6366f1" flood-opacity="0.25" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="card-shadow">
          <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
        </filter>

        <linearGradient id="progress-rail" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4ade80" stop-opacity="0.06"/>
          <stop offset="100%" stop-color="#4ade80" stop-opacity="0.02"/>
        </linearGradient>
      </defs>

      <!-- Center guide rail -->
      <line x1="330" y1="40" x2="330" y2="920" stroke="#1e1e36" stroke-width="1" stroke-dasharray="4,8"/>

      <!-- Progress rail background for completed zone (steps 1-2) -->
      <rect x="200" y="25" width="260" height="310" rx="12" fill="url(#progress-rail)"/>

      <!-- ==================== EDGES ==================== -->

      <!-- Start -> Step 1 (completed) -->
      <path class="flow-edge main" data-from="start" data-to="step1"
            d="M 330,66 L 330,90"
            stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#arrow-main)"
            style="animation-delay: 0.05s;"/>

      <!-- Step 1 -> Decision 1 (completed) -->
      <path class="flow-edge main" data-from="step1" data-to="dec1"
            d="M 330,152 L 330,178"
            stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#arrow-main)"
            style="animation-delay: 0.1s;"/>

      <!-- Decision 1 -> Step 2 (yes, completed) -->
      <path class="flow-edge main" data-from="dec1" data-to="step2"
            d="M 330,238 L 330,270"
            stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#arrow-main)"
            style="animation-delay: 0.15s;"/>

      <!-- Decision 1 -> 재입력 요청 (no, error) -->
      <path class="flow-edge error" data-from="dec1" data-to="alt1"
            d="M 358,208 L 510,208 L 510,280"
            stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3" fill="none"
            marker-end="url(#arrow-error)"
            style="animation-delay: 0.15s;"/>

      <!-- 재입력 요청 -> Step 1 loop-back -->
      <path class="flow-edge error" data-from="alt1" data-to="step1"
            d="M 570,300 L 610,300 L 610,121 L 420,121"
            stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3" fill="none"
            marker-end="url(#arrow-error)"
            style="animation-delay: 0.2s;"/>

      <!-- Step 2 -> Decision 2 (active) -->
      <path class="flow-edge main" data-from="step2" data-to="dec2"
            d="M 330,332 L 330,368"
            stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrow-active)"
            style="animation-delay: 0.2s;"/>

      <!-- Decision 2 -> Step 3 (yes, pending) -->
      <path class="flow-edge main" data-from="dec2" data-to="step3"
            d="M 330,428 L 330,458"
            stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrow-active)"
            style="animation-delay: 0.25s;"/>

      <!-- Decision 2 -> 강도 안내 (no, alt) -->
      <path class="flow-edge alt" data-from="dec2" data-to="alt2"
            d="M 358,398 L 510,398 L 510,468"
            stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3" fill="none"
            marker-end="url(#arrow-alt)"
            style="animation-delay: 0.25s;"/>

      <!-- 강도 안내 -> Step 2 loop-back -->
      <path class="flow-edge alt" data-from="alt2" data-to="step2"
            d="M 570,488 L 610,488 L 610,311 L 420,311"
            stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3" fill="none"
            marker-end="url(#arrow-alt)"
            style="animation-delay: 0.3s;"/>

      <!-- Step 3 -> Step 4 -->
      <path class="flow-edge main" data-from="step3" data-to="step4"
            d="M 330,520 L 330,548"
            stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrow-active)"
            style="animation-delay: 0.3s;"/>

      <!-- Step 4 -> Step 5 -->
      <path class="flow-edge main" data-from="step4" data-to="step5"
            d="M 330,610 L 330,638"
            stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrow-active)"
            style="animation-delay: 0.35s;"/>

      <!-- Step 5 -> Decision 3 -->
      <path class="flow-edge main" data-from="step5" data-to="dec3"
            d="M 330,700 L 330,728"
            stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrow-active)"
            style="animation-delay: 0.4s;"/>

      <!-- Decision 3 -> End (success) -->
      <path class="flow-edge main" data-from="dec3" data-to="end"
            d="M 330,788 L 330,820"
            stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrow-active)"
            style="animation-delay: 0.45s;"/>

      <!-- Decision 3 -> 재발송 (fail, error) -->
      <path class="flow-edge error" data-from="dec3" data-to="alt3"
            d="M 358,758 L 510,758 L 510,830"
            stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3" fill="none"
            marker-end="url(#arrow-error)"
            style="animation-delay: 0.45s;"/>

      <!-- 재발송 -> Step 5 loop-back -->
      <path class="flow-edge error" data-from="alt3" data-to="step5"
            d="M 570,850 L 610,850 L 610,669 L 420,669"
            stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3" fill="none"
            marker-end="url(#arrow-error)"
            style="animation-delay: 0.5s;"/>

      <!-- ==================== NODES ==================== -->

      <!-- START -->
      <g class="flow-node start" data-id="start" data-tooltip="회원가입 플로우 시작"
         style="animation-delay: 0s;">
        <rect x="275" y="26" width="110" height="40" rx="20"
              fill="#1a1a2e" stroke="#4ade80" stroke-width="2.5"
              filter="url(#glow-decided)"/>
        <text x="330" y="48" text-anchor="middle" dominant-baseline="central"
              fill="#4ade80" font-size="14" font-weight="bold">시작</text>
      </g>

      <!-- STEP 1: 이메일 입력 (completed) -->
      <g class="flow-node process" data-id="step1" data-tooltip="사용자가 이메일 주소를 입력합니다"
         data-status="completed" style="animation-delay: 0.05s;">
        <circle cx="237" cy="96" r="14" fill="#4ade8018" stroke="#4ade8099" stroke-width="1.5"/>
        <text x="237" y="97" text-anchor="middle" dominant-baseline="central"
              fill="#4ade80" font-size="11" font-weight="bold">1</text>
        <rect x="240" y="90" width="4" height="52" rx="2" fill="#4ade80" opacity="0.5"/>
        <rect x="244" y="90" width="172" height="52" rx="8"
              fill="#1a1a2e" stroke="#4ade80" stroke-width="2" opacity="0.85"
              filter="url(#glow-decided)"/>
        <rect x="244" y="90" width="172" height="5" rx="2" fill="#4ade80" opacity="0.5"/>
        <circle cx="404" cy="102" r="8" fill="#4ade8030"/>
        <text x="404" y="103" text-anchor="middle" dominant-baseline="central"
              fill="#4ade80" font-size="9">✓</text>
        <text x="330" y="116" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">이메일 입력</text>
        <text x="330" y="133" text-anchor="middle" dominant-baseline="central"
              fill="#888888" font-size="11">이메일 주소 입력</text>
      </g>

      <!-- DECISION 1: 유효? -->
      <g class="flow-node decision" data-id="dec1" data-tooltip="입력된 이메일 주소의 유효성을 검증합니다"
         style="animation-delay: 0.1s;">
        <rect x="302" y="180" width="56" height="56" rx="4"
              transform="rotate(45, 330, 208)"
              fill="#1a1a2e" stroke="#facc15" stroke-width="2.5"
              filter="url(#glow-active)"/>
        <text x="330" y="204" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="12" font-weight="bold">유효?</text>
        <text x="330" y="218" text-anchor="middle" dominant-baseline="central"
              fill="#888888" font-size="9">이메일 검증</text>
      </g>

      <!-- STEP 2: 비밀번호 설정 (completed) -->
      <g class="flow-node process" data-id="step2" data-tooltip="사용자가 비밀번호를 설정합니다"
         data-status="completed" style="animation-delay: 0.15s;">
        <circle cx="237" cy="276" r="14" fill="#4ade8018" stroke="#4ade8099" stroke-width="1.5"/>
        <text x="237" y="277" text-anchor="middle" dominant-baseline="central"
              fill="#4ade80" font-size="11" font-weight="bold">2</text>
        <rect x="240" y="270" width="4" height="52" rx="2" fill="#4ade80" opacity="0.5"/>
        <rect x="244" y="270" width="172" height="52" rx="8"
              fill="#1a1a2e" stroke="#4ade80" stroke-width="2" opacity="0.85"
              filter="url(#glow-decided)"/>
        <rect x="244" y="270" width="172" height="5" rx="2" fill="#4ade80" opacity="0.5"/>
        <circle cx="404" cy="282" r="8" fill="#4ade8030"/>
        <text x="404" y="283" text-anchor="middle" dominant-baseline="central"
              fill="#4ade80" font-size="9">✓</text>
        <text x="330" y="296" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">비밀번호 설정</text>
        <text x="330" y="313" text-anchor="middle" dominant-baseline="central"
              fill="#888888" font-size="11">비밀번호 입력</text>
      </g>

      <!-- DECISION 2: 충분? (active) -->
      <g class="flow-node decision" data-id="dec2" data-tooltip="비밀번호 강도가 기준을 충족하는지 확인합니다"
         style="animation-delay: 0.2s;">
        <rect x="302" y="370" width="56" height="56" rx="4"
              transform="rotate(45, 330, 398)"
              fill="#1a1a2e" stroke="#facc15" stroke-width="2.5"
              filter="url(#glow-active)"/>
        <circle cx="300" cy="370" r="5" fill="#facc15">
          <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text x="330" y="394" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="12" font-weight="bold">충분?</text>
        <text x="330" y="408" text-anchor="middle" dominant-baseline="central"
              fill="#888888" font-size="9">강도 확인</text>
      </g>

      <!-- STEP 3: 프로필 입력 (pending) -->
      <g class="flow-node process" data-id="step3" data-tooltip="사용자 프로필 정보를 입력합니다"
         data-status="pending" style="animation-delay: 0.25s;">
        <circle cx="237" cy="464" r="14" fill="#6366f118" stroke="#6366f199" stroke-width="1.5"/>
        <text x="237" y="465" text-anchor="middle" dominant-baseline="central"
              fill="#6366f1" font-size="11" font-weight="bold">3</text>
        <rect x="240" y="458" width="4" height="52" rx="2" fill="#6366f1" opacity="0.5"/>
        <rect x="244" y="458" width="172" height="52" rx="8"
              fill="#1a1a2e" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3"/>
        <rect x="244" y="458" width="172" height="5" rx="2" fill="#6366f1" opacity="0.3"/>
        <text x="330" y="484" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">프로필 입력</text>
        <text x="330" y="501" text-anchor="middle" dominant-baseline="central"
              fill="#888888" font-size="11">이름, 사진 등</text>
      </g>

      <!-- STEP 4: 이용약관 동의 (pending) -->
      <g class="flow-node process" data-id="step4" data-tooltip="이용약관 및 개인정보 처리방침에 동의합니다"
         data-status="pending" style="animation-delay: 0.3s;">
        <circle cx="237" cy="554" r="14" fill="#6366f118" stroke="#6366f199" stroke-width="1.5"/>
        <text x="237" y="555" text-anchor="middle" dominant-baseline="central"
              fill="#6366f1" font-size="11" font-weight="bold">4</text>
        <rect x="240" y="548" width="4" height="52" rx="2" fill="#6366f1" opacity="0.5"/>
        <rect x="244" y="548" width="172" height="52" rx="8"
              fill="#1a1a2e" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3"/>
        <rect x="244" y="548" width="172" height="5" rx="2" fill="#6366f1" opacity="0.3"/>
        <text x="330" y="574" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">이용약관 동의</text>
        <text x="330" y="591" text-anchor="middle" dominant-baseline="central"
              fill="#888888" font-size="11">약관 확인 및 동의</text>
      </g>

      <!-- STEP 5: 인증 메일 발송 (pending) -->
      <g class="flow-node process" data-id="step5" data-tooltip="이메일 인증 링크를 발송합니다"
         data-status="pending" style="animation-delay: 0.35s;">
        <circle cx="237" cy="644" r="14" fill="#6366f118" stroke="#6366f199" stroke-width="1.5"/>
        <text x="237" y="645" text-anchor="middle" dominant-baseline="central"
              fill="#6366f1" font-size="11" font-weight="bold">5</text>
        <rect x="240" y="638" width="4" height="52" rx="2" fill="#6366f1" opacity="0.5"/>
        <rect x="244" y="638" width="172" height="52" rx="8"
              fill="#1a1a2e" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3"/>
        <rect x="244" y="638" width="172" height="5" rx="2" fill="#6366f1" opacity="0.3"/>
        <text x="330" y="664" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">인증 메일 발송</text>
        <text x="330" y="681" text-anchor="middle" dominant-baseline="central"
              fill="#888888" font-size="11">이메일 인증 링크</text>
      </g>

      <!-- DECISION 3: 인증? -->
      <g class="flow-node decision" data-id="dec3" data-tooltip="이메일 인증이 성공했는지 확인합니다. 실패 시 최대 3회 재발송"
         style="animation-delay: 0.4s;">
        <rect x="302" y="730" width="56" height="56" rx="4"
              transform="rotate(45, 330, 758)"
              fill="#1a1a2e" stroke="#facc15" stroke-width="2.5"
              filter="url(#glow-active)"/>
        <text x="330" y="754" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="12" font-weight="bold">인증?</text>
        <text x="330" y="768" text-anchor="middle" dominant-baseline="central"
              fill="#888888" font-size="9">메일 확인</text>
      </g>

      <!-- END -->
      <g class="flow-node end" data-id="end" data-tooltip="회원가입 완료"
         style="animation-delay: 0.45s;">
        <rect x="275" y="820" width="110" height="40" rx="20"
              fill="#1a1a2e" stroke="#4ade80" stroke-width="2.5"/>
        <rect x="278" y="823" width="104" height="34" rx="17"
              fill="none" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
        <text x="330" y="843" text-anchor="middle" dominant-baseline="central"
              fill="#4ade80" font-size="14" font-weight="bold">완료</text>
      </g>

      <!-- ==================== ALT BRANCH NODES ==================== -->

      <!-- ALT 1: 재입력 요청 -->
      <g class="flow-node process" data-id="alt1" data-tooltip="이메일이 유효하지 않으면 재입력을 요청합니다"
         data-status="pending" style="animation-delay: 0.15s;">
        <rect x="460" y="270" width="120" height="52" rx="8"
              fill="#1a1a2e" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3"/>
        <rect x="460" y="270" width="4" height="52" rx="2" fill="#f87171" opacity="0.5"/>
        <rect x="460" y="270" width="120" height="5" rx="2" fill="#f87171" opacity="0.4"/>
        <text x="520" y="296" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="12" font-weight="bold">재입력 요청</text>
        <text x="520" y="313" text-anchor="middle" dominant-baseline="central"
              fill="#888888" font-size="10">이메일 오류 안내</text>
      </g>

      <!-- ALT 2: 강도 안내 -->
      <g class="flow-node process" data-id="alt2" data-tooltip="비밀번호 강도가 부족하면 강도 요구사항을 안내합니다"
         data-status="pending" style="animation-delay: 0.25s;">
        <rect x="460" y="458" width="120" height="52" rx="8"
              fill="#1a1a2e" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3"/>
        <rect x="460" y="458" width="4" height="52" rx="2" fill="#6b7280" opacity="0.5"/>
        <rect x="460" y="458" width="120" height="5" rx="2" fill="#6b7280" opacity="0.4"/>
        <text x="520" y="484" text-anchor="middle" dominant-baseline="central"

  <div class="flow-tooltip"></div>

  <script>
    const tooltip = document.querySelector('.flow-tooltip');
    const allEdges = document.querySelectorAll('.flow-edge');
    const allNodes = document.querySelectorAll('.flow-node');

    allNodes.forEach(node => {
      const nodeId = node.getAttribute('data-id');

      node.addEventListener('mouseenter', e => {
        const desc = node.getAttribute('data-tooltip');
        if (!desc) return;
        const status = node.getAttribute('data-status');
        const statusLabel = { active: '현재', completed: '완료', pending: '대기' }[status] || '';
        const statusColor = { active: '#facc15', completed: '#4ade80', pending: '#6366f1' }[status] || '#888888';

        tooltip.innerHTML = '<div style="font-weight:bold;margin-bottom:4px;">' + desc + '</div>' +
          (statusLabel ? '<span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:bold;background:' + statusColor + '20;color:' + statusColor + '">' + statusLabel + '</span>' : '');
        tooltip.classList.add('visible');

        allEdges.forEach(edge => {
          if (edge.getAttribute('data-from') === nodeId || edge.getAttribute('data-to') === nodeId) {
            edge.classList.add('highlighted');
            edge.classList.remove('dimmed');
          } else {
            edge.classList.add('dimmed');
            edge.classList.remove('highlighted');
          }
        });
      });

      node.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top = (e.clientY + 14) + 'px';
      });

      node.addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
        allEdges.forEach(edge => edge.classList.remove('highlighted', 'dimmed'));
      });
    });
  </script>
