<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Compass — Concept Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { font-size: 20px; margin-bottom: 4px; text-align: center; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 28px; text-align: center; }
    .container { overflow-x: auto; width: 100%; max-width: 1200px; }
    svg { width: 100%; height: auto; }
    .meta { color: #666; font-size: 11px; margin-top: 20px; text-align: right; width: 100%; max-width: 1200px; }

    .concept-tooltip {
      position: fixed; pointer-events: none; z-index: 100;
      background: #1a1a2eee; border: 1px solid #4a4a7a; border-radius: 10px;
      padding: 10px 14px; font-size: 12px; color: #e2e8f0;
      max-width: 280px; opacity: 0; transition: opacity 0.15s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
    }
    .concept-tooltip.visible { opacity: 1; }
    .concept-tooltip .tt-status {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      font-size: 10px; font-weight: bold; margin-top: 4px;
    }
    .concept-tooltip .tt-relations {
      margin-top: 6px; padding-top: 6px; border-top: 1px solid #2a2a4a;
      font-size: 11px; color: #888888;
    }
  </style>
</head>
<body>
  <h1>Planning Compass — Concept Map</h1>
  <p class="subtitle">모바일 앱 아키텍처 — 기술 스택 및 인프라 관계도</p>

  <div class="container">
    <svg width="100%" viewBox="0 0 1160 700"
         preserveAspectRatio="xMidYMid meet"
         style="background: #0f0f1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
      <defs>
        <!-- Glow filters -->
        <filter id="glow-frontend" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
          <feFlood flood-color="#6366f1" flood-opacity="0.2" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-backend" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
          <feFlood flood-color="#3b82f6" flood-opacity="0.2" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-auth" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
          <feFlood flood-color="#10b981" flood-opacity="0.2" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-notification" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
          <feFlood flood-color="#f59e0b" flood-opacity="0.2" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-devops" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
          <feFlood flood-color="#8b5cf6" flood-opacity="0.2" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-core" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
          <feFlood flood-color="#06b6d4" flood-opacity="0.3" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- Arrowhead markers -->
        <marker id="arrow-workflow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,1 10,4 0,7" fill="#facc15"/>
        </marker>
        <marker id="arrow-dependency" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,1 10,4 0,7" fill="#ef4444"/>
        </marker>
        <marker id="arrow-communication" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto-start-reverse">
          <polygon points="0,0.5 8,3 0,5.5" fill="#38bdf8"/>
        </marker>

        <!-- Gradients -->
        <linearGradient id="grad-frontend" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#6366f1" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="grad-backend" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="grad-auth" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#10b981" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#10b981" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="grad-notification" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="grad-devops" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.02"/>
        </linearGradient>

        <style>
          .node-group { cursor: pointer; transition: transform 0.2s ease, filter 0.2s ease; }
          .node-group:hover { transform: scale(1.05); }
          .edge-path { transition: stroke-opacity 0.3s, stroke-width 0.3s; }
          .edge-path.dimmed { stroke-opacity: 0.12 !important; }
          .edge-path.highlighted { stroke-opacity: 1 !important; stroke-width: 3 !important; }
          .domain-region { transition: fill-opacity 0.3s; }
          .domain-region:hover { fill-opacity: 0.15; }

          .node-group, .edge-path, .domain-region {
            opacity: 0; animation: fadeIn 0.4s ease-out forwards;
          }
          @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
          }
          @keyframes dash-flow {
            to { stroke-dashoffset: -20; }
          }
          .workflow-animated {
            stroke-dasharray: 8, 4;
            animation: dash-flow 1.5s linear infinite, fadeIn 0.4s ease-out forwards;
          }
        </style>
      </defs>

      <!-- ============================================ -->
      <!-- BACKGROUND REGIONS                           -->
      <!-- Layout: Hub center, satellites around it     -->
      <!--                                              -->
      <!--   [Frontend]          [Backend]              -->
      <!--              [모바일앱]                        -->
      <!--   [Auth]           [Notification]            -->
      <!--              [DevOps]                        -->
      <!-- ============================================ -->

      <!-- Region: Frontend (top-left) -->
      <g class="domain-region" style="animation-delay: 0s;">
        <rect x="60" y="40" width="280" height="130" rx="16"
              fill="url(#grad-frontend)" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1.5"/>
        <line x1="120" y1="62" x2="160" y2="62" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
        <text x="200" y="66" text-anchor="middle" fill="#6366f1" fill-opacity="0.8" font-size="11" font-weight="700" letter-spacing="2">FRONTEND</text>
        <line x1="240" y1="62" x2="280" y2="62" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
      </g>

      <!-- Region: Backend (top-right) -->
      <g class="domain-region" style="animation-delay: 0.05s;">
        <rect x="520" y="40" width="340" height="130" rx="16"
              fill="url(#grad-backend)" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1.5"/>
        <line x1="620" y1="62" x2="660" y2="62" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1"/>
        <text x="690" y="66" text-anchor="middle" fill="#3b82f6" fill-opacity="0.8" font-size="11" font-weight="700" letter-spacing="2">BACKEND</text>
        <line x1="720" y1="62" x2="760" y2="62" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1"/>
      </g>

      <!-- Region: Auth (bottom-left) -->
      <g class="domain-region" style="animation-delay: 0.1s;">
        <rect x="60" y="380" width="260" height="130" rx="16"
              fill="url(#grad-auth)" stroke="#10b981" stroke-opacity="0.2" stroke-width="1.5"/>
        <line x1="100" y1="402" x2="140" y2="402" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
        <text x="190" y="406" text-anchor="middle" fill="#10b981" fill-opacity="0.8" font-size="11" font-weight="700" letter-spacing="2">AUTHENTICATION</text>
        <line x1="240" y1="402" x2="280" y2="402" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
      </g>

      <!-- Region: Notification (bottom-right) -->
      <g class="domain-region" style="animation-delay: 0.15s;">
        <rect x="520" y="380" width="340" height="130" rx="16"
              fill="url(#grad-notification)" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="1.5"/>
        <line x1="610" y1="402" x2="650" y2="402" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1"/>
        <text x="690" y="406" text-anchor="middle" fill="#f59e0b" fill-opacity="0.8" font-size="11" font-weight="700" letter-spacing="2">NOTIFICATION</text>
        <line x1="730" y1="402" x2="770" y2="402" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1"/>
      </g>

      <!-- Region: DevOps (bottom-center) -->
      <g class="domain-region" style="animation-delay: 0.2s;">
        <rect x="220" y="560" width="460" height="120" rx="16"
              fill="url(#grad-devops)" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="1.5"/>
        <line x1="370" y1="582" x2="410" y2="582" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1"/>
        <text x="450" y="586" text-anchor="middle" fill="#8b5cf6" fill-opacity="0.8" font-size="11" font-weight="700" letter-spacing="2">DEVOPS</text>
        <line x1="490" y1="582" x2="530" y2="582" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1"/>
      </g>

      <!-- ============================================ -->
      <!-- EDGES                                        -->
      <!-- ============================================ -->

      <!-- Mobile App -> React Native (workflow) -->
      <path class="edge-path workflow-animated" data-from="mobile-app" data-to="react-native" data-type="workflow"
            d="M 380,270 C 310,240 250,170 210,130"
            stroke="#facc15" stroke-width="2" fill="none" opacity="0.8"
            marker-end="url(#arrow-workflow)"
            style="animation-delay: 0.5s;"/>

      <!-- Mobile App -> Node.js (workflow) -->
      <path class="edge-path workflow-animated" data-from="mobile-app" data-to="nodejs" data-type="workflow"
            d="M 500,270 C 560,240 620,170 650,130"
            stroke="#facc15" stroke-width="2" fill="none" opacity="0.8"
            marker-end="url(#arrow-workflow)"
            style="animation-delay: 0.55s;"/>

      <!-- Node.js -> PostgreSQL (dependency) -->
      <path class="edge-path" data-from="nodejs" data-to="postgresql" data-type="dependency"
            d="M 690,110 C 720,110 740,110 760,110"
            stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" fill="none" opacity="0.7"
            marker-end="url(#arrow-dependency)"
            style="animation-delay: 0.6s;"/>
      <rect x="730" y="114" width="36" height="18" rx="9" fill="#0f0f1a" stroke="#ef444430" stroke-width="0.5"/>
      <text x="748" y="126" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="500" style="opacity:0; animation: fadeIn 0.4s ease-out forwards; animation-delay: 0.6s;">의존</text>

      <!-- Mobile App -> OAuth2 (workflow) -->
      <path class="edge-path workflow-animated" data-from="mobile-app" data-to="oauth2" data-type="workflow"
            d="M 380,310 C 310,340 250,390 210,420"
            stroke="#facc15" stroke-width="2" fill="none" opacity="0.8"
            marker-end="url(#arrow-workflow)"
            style="animation-delay: 0.65s;"/>

      <!-- OAuth2 -> Node.js (dependency) -->
      <path class="edge-path" data-from="oauth2" data-to="nodejs" data-type="dependency"
            d="M 210,420 C 300,360 550,180 630,120"
            stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" fill="none" opacity="0.7"
            marker-end="url(#arrow-dependency)"
            style="animation-delay: 0.7s;"/>
      <rect x="330" y="322" width="60" height="18" rx="9" fill="#0f0f1a" stroke="#ef444430" stroke-width="0.5"/>
      <text x="360" y="334" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="500" style="opacity:0; animation: fadeIn 0.4s ease-out forwards; animation-delay: 0.7s;">인증 처리</text>

      <!-- Mobile App -> Firebase (workflow) -->
      <path class="edge-path workflow-animated" data-from="mobile-app" data-to="firebase" data-type="workflow"
            d="M 500,310 C 560,340 620,390 660,420"
            stroke="#facc15" stroke-width="2" fill="none" opacity="0.8"
            marker-end="url(#arrow-workflow)"
            style="animation-delay: 0.75s;"/>

      <!-- Firebase -> Node.js (communication) -->
      <path class="edge-path" data-from="firebase" data-to="nodejs" data-type="communication"
            d="M 700,420 C 740,340 710,200 680,130"
            stroke="#38bdf8" stroke-width="1.8" stroke-dasharray="4,4" fill="none" opacity="0.6"
            marker-end="url(#arrow-communication)"
            style="animation-delay: 0.8s;"/>
      <rect x="730" y="320" width="62" height="18" rx="9" fill="#0f0f1a" stroke="#38bdf830" stroke-width="0.5"/>
      <text x="761" y="332" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="500" style="opacity:0; animation: fadeIn 0.4s ease-out forwards; animation-delay: 0.8s;">푸시 트리거</text>

      <!-- GitHub Actions -> React Native (communication) -->
      <path class="edge-path" data-from="github-actions" data-to="react-native" data-type="communication"
            d="M 340,600 C 240,540 160,260 180,130"
            stroke="#38bdf8" stroke-width="1.8" stroke-dasharray="4,4" fill="none" opacity="0.6"
            marker-end="url(#arrow-communication)"
            style="animation-delay: 0.85s;"/>
      <rect x="148" y="340" width="40" height="18" rx="9" fill="#0f0f1a" stroke="#38bdf830" stroke-width="0.5"/>
      <text x="168" y="352" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="500" style="opacity:0; animation: fadeIn 0.4s ease-out forwards; animation-delay: 0.85s;">빌드</text>

      <!-- GitHub Actions -> Node.js (communication) -->
      <path class="edge-path" data-from="github-actions" data-to="nodejs" data-type="communication"
            d="M 380,600 C 470,520 600,260 640,130"
            stroke="#38bdf8" stroke-width="1.8" stroke-dasharray="4,4" fill="none" opacity="0.6"
            marker-end="url(#arrow-communication)"
            style="animation-delay: 0.9s;"/>
      <rect x="430" y="490" width="40" height="18" rx="9" fill="#0f0f1a" stroke="#38bdf830" stroke-width="0.5"/>
      <text x="450" y="502" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="500" style="opacity:0; animation: fadeIn 0.4s ease-out forwards; animation-delay: 0.9s;">배포</text>

      <!-- Datadog -> Node.js (communication) -->
      <path class="edge-path" data-from="datadog" data-to="nodejs" data-type="communication"
            d="M 560,600 C 620,500 680,260 670,130"
            stroke="#38bdf8" stroke-width="1.8" stroke-dasharray="4,4" fill="none" opacity="0.6"
            marker-end="url(#arrow-communication)"
            style="animation-delay: 0.95s;"/>
      <rect x="625" y="530" width="60" height="18" rx="9" fill="#0f0f1a" stroke="#38bdf830" stroke-width="0.5"/>
      <text x="655" y="542" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="500" style="opacity:0; animation: fadeIn 0.4s ease-out forwards; animation-delay: 0.95s;">모니터링</text>

      <!-- Datadog -> Mobile App (communication) -->
      <path class="edge-path" data-from="datadog" data-to="mobile-app" data-type="communication"
            d="M 530,600 C 500,540 470,370 450,330"
            stroke="#38bdf8" stroke-width="1.8" stroke-dasharray="4,4" fill="none" opacity="0.6"
            marker-end="url(#arrow-communication)"
            style="animation-delay: 1s;"/>

      <!-- ============================================ -->
      <!-- NODES                                        -->
      <!-- ============================================ -->

      <!-- Central Hub: Mobile App (core, decided, cyan) -->
      <g class="node-group" data-id="mobile-app" data-tooltip="모바일 앱 — 팀에서 새로 개발하는 핵심 프로젝트" data-status="decided"
         style="animation-delay: 0.3s;">
        <rect x="375" y="270" width="140" height="46" rx="10"
              fill="#1a1a2e" stroke="#06b6d4" stroke-width="3"
              filter="url(#glow-core)"/>
        <rect x="375" y="270" width="140" height="5" rx="2" fill="#06b6d4" fill-opacity="0.6"/>
        <circle cx="505" cy="280" r="4" fill="#4ade80"/>
        <text x="445" y="296" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="14" font-weight="bold">모바일 앱</text>
      </g>

      <!-- React Native (core, decided, indigo) -->
      <g class="node-group" data-id="react-native" data-tooltip="React Native — 크로스 플랫폼 프론트엔드 프레임워크" data-status="decided"
         style="animation-delay: 0.35s;">
        <rect x="100" y="90" width="170" height="42" rx="8"
              fill="#1a1a2e" stroke="#6366f1" stroke-width="2.5"
              filter="url(#glow-frontend)"/>
        <rect x="100" y="90" width="170" height="4" rx="2" fill="#6366f1" fill-opacity="0.5"/>
        <circle cx="260" cy="100" r="4" fill="#4ade80"/>
        <circle cx="185" cy="132" r="3.5" fill="#6366f1" fill-opacity="0.5"/>
        <text x="185" y="113" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">React Native</text>
      </g>

      <!-- Node.js (core, decided, blue) -->
      <g class="node-group" data-id="nodejs" data-tooltip="Node.js — 백엔드 런타임, API 서버" data-status="decided"
         style="animation-delay: 0.35s;">
        <rect x="580" y="90" width="130" height="42" rx="8"
              fill="#1a1a2e" stroke="#3b82f6" stroke-width="2.5"
              filter="url(#glow-backend)"/>
        <rect x="580" y="90" width="130" height="4" rx="2" fill="#3b82f6" fill-opacity="0.5"/>
        <circle cx="700" cy="100" r="4" fill="#4ade80"/>
        <circle cx="645" cy="132" r="3.5" fill="#3b82f6" fill-opacity="0.5"/>
        <text x="645" y="113" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">Node.js</text>
      </g>

      <!-- PostgreSQL (sub-node, decided, blue) -->
      <g class="node-group" data-id="postgresql" data-tooltip="PostgreSQL — 관계형 데이터베이스" data-status="decided"
         style="animation-delay: 0.4s;">
        <rect x="740" y="94" width="100" height="36" rx="6"
              fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5"/>
        <circle cx="832" cy="102" r="3" fill="#4ade80"/>
        <text x="790" y="114" text-anchor="middle" dominant-baseline="central"
              fill="#888888" font-size="11">PostgreSQL</text>
      </g>

      <!-- OAuth2 (core, decided, emerald) -->
      <g class="node-group" data-id="oauth2" data-tooltip="OAuth2 — 사용자 인증 프로토콜" data-status="decided"
         style="animation-delay: 0.4s;">
        <rect x="120" y="430" width="110" height="42" rx="8"
              fill="#1a1a2e" stroke="#10b981" stroke-width="2.5"
              filter="url(#glow-auth)"/>
        <rect x="120" y="430" width="110" height="4" rx="2" fill="#10b981" fill-opacity="0.5"/>
        <circle cx="220" cy="440" r="4" fill="#4ade80"/>
        <circle cx="175" cy="430" r="3.5" fill="#10b981" fill-opacity="0.5"/>
        <text x="175" y="453" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">OAuth2</text>
      </g>

      <!-- Firebase Push (core, decided, amber) -->
      <g class="node-group" data-id="firebase" data-tooltip="Firebase Cloud Messaging — 푸시 알림 서비스" data-status="decided"
         style="animation-delay: 0.4s;">
        <rect x="575" y="430" width="200" height="42" rx="8"
              fill="#1a1a2e" stroke="#f59e0b" stroke-width="2.5"
              filter="url(#glow-notification)"/>
        <rect x="575" y="430" width="200" height="4" rx="2" fill="#f59e0b" fill-opacity="0.5"/>
        <circle cx="765" cy="440" r="4" fill="#4ade80"/>
        <circle cx="675" cy="430" r="3.5" fill="#f59e0b" fill-opacity="0.5"/>
        <text x="675" y="453" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">Firebase Push</text>
      </g>

      <!-- GitHub Actions (core, decided, violet) -->
      <g class="node-group" data-id="github-actions" data-tooltip="GitHub Actions — CI/CD 자동화 파이프라인" data-status="decided"
         style="animation-delay: 0.45s;">
        <rect x="260" y="600" width="170" height="42" rx="8"

  <!-- Tooltip container -->
  <div class="concept-tooltip"></div>

  <div class="meta">
    Last updated: 2026-04-05 · Planning Compass
  </div>

  <script>
    const tooltip = document.querySelector('.concept-tooltip');
    const allEdges = document.querySelectorAll('.edge-path');
    const allNodes = document.querySelectorAll('.node-group');

    allNodes.forEach(node => {
      const nodeId = node.getAttribute('data-id');

      node.addEventListener('mouseenter', e => {
        const desc = node.getAttribute('data-tooltip');
        const status = node.getAttribute('data-status');
        const statusLabel = { decided: '결정됨', active: '논의 중', undecided: '미결정' }[status] || '';
        const statusColor = { decided: '#4ade80', active: '#facc15', undecided: '#6b7280' }[status] || '#6b7280';

        const connected = new Set();
        allEdges.forEach(edge => {
          const from = edge.getAttribute('data-from');
          const to = edge.getAttribute('data-to');
          if (from === nodeId || to === nodeId) {
            edge.classList.add('highlighted');
            edge.classList.remove('dimmed');
            connected.add(from); connected.add(to);
          } else {
            edge.classList.add('dimmed');
            edge.classList.remove('highlighted');
          }
        });

        allNodes.forEach(n => {
          const nId = n.getAttribute('data-id');
          n.style.opacity = connected.has(nId) || nId === nodeId ? '1' : '0.3';
        });

        let relText = '';
        allEdges.forEach(edge => {
          if (edge.getAttribute('data-from') === nodeId || edge.getAttribute('data-to') === nodeId) {
            const type = edge.getAttribute('data-type');
            const typeLabel = { workflow: '워크플로우', dependency: '의존성', communication: '통신' }[type] || type;
            const other = edge.getAttribute('data-from') === nodeId
              ? edge.getAttribute('data-to') : edge.getAttribute('data-from');
            relText += '<div>\u2192 ' + other + ' (' + typeLabel + ')</div>';
          }
        });

        tooltip.innerHTML =
          '<div style="font-weight:bold;margin-bottom:4px;">' + desc + '</div>' +
          '<span class="tt-status" style="background:' + statusColor + '20;color:' + statusColor + '">' + statusLabel + '</span>' +
          (relText ? '<div class="tt-relations">' + relText + '</div>' : '');
        tooltip.classList.add('visible');
      });

      node.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top = (e.clientY + 14) + 'px';
      });

      node.addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
        allEdges.forEach(edge => { edge.classList.remove('highlighted', 'dimmed'); });
        allNodes.forEach(n => { n.style.opacity = '1'; });
      });
    });
  </script>
