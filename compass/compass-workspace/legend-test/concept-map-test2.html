<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Compass — Concept Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { font-size: 20px; margin-bottom: 4px; text-align: center; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 28px; text-align: center; }
    .container { overflow-x: auto; width: 100%; max-width: 1100px; }
    svg { width: 100%; height: auto; }
    .meta { color: #666; font-size: 11px; margin-top: 20px; text-align: right; width: 100%; max-width: 1100px; }

    .concept-tooltip {
      position: fixed; pointer-events: none; z-index: 100;
      background: #1a1a2eee; border: 1px solid #4a4a7a; border-radius: 10px;
      padding: 10px 14px; font-size: 12px; color: #e2e8f0;
      max-width: 280px; opacity: 0; transition: opacity 0.15s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
    }
    .concept-tooltip.visible { opacity: 1; }
    .concept-tooltip .tt-status {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      font-size: 10px; font-weight: bold; margin-top: 4px;
    }
    .concept-tooltip .tt-relations {
      margin-top: 6px; padding-top: 6px; border-top: 1px solid #2a2a4a;
      font-size: 11px; color: #888888;
    }
  </style>
</head>
<body>
  <h1>Planning Compass — Concept Map</h1>
  <p class="subtitle">SaaS 플랫폼 아키텍처 구성도</p>

  <div class="container">
    <svg width="100%" viewBox="0 0 1060 680"
         preserveAspectRatio="xMidYMid meet"
         style="background: #0f0f1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
      <defs>
        <!-- Glow filters per domain -->
        <filter id="glow-frontend" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
          <feFlood flood-color="#6366f1" flood-opacity="0.2" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-backend" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
          <feFlood flood-color="#3b82f6" flood-opacity="0.2" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-infra" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
          <feFlood flood-color="#10b981" flood-opacity="0.2" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-auth" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
          <feFlood flood-color="#f59e0b" flood-opacity="0.2" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-payments" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
          <feFlood flood-color="#8b5cf6" flood-opacity="0.2" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-core" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
          <feFlood flood-color="#ef4444" flood-opacity="0.25" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- Arrowhead markers -->
        <marker id="arrow-workflow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,1 10,4 0,7" fill="#facc15"/>
        </marker>
        <marker id="arrow-dependency" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto-start-reverse">
          <polygon points="0,1 10,4 0,7" fill="#ef4444"/>
        </marker>
        <marker id="arrow-communication" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto-start-reverse">
          <polygon points="0,0.5 8,3 0,5.5" fill="#38bdf8"/>
        </marker>

        <!-- Domain gradients -->
        <linearGradient id="grad-frontend" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#6366f1" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="grad-backend" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="grad-infra" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#10b981" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#10b981" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="grad-auth" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="grad-payments" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="grad-core" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ef4444" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#ef4444" stop-opacity="0.02"/>
        </linearGradient>

        <style>
          .node-group { cursor: pointer; transition: transform 0.2s ease, filter 0.2s ease; }
          .node-group:hover { transform: scale(1.05); }
          .edge-path { transition: stroke-opacity 0.3s, stroke-width 0.3s; }
          .edge-path.dimmed { stroke-opacity: 0.12 !important; }
          .edge-path.highlighted { stroke-opacity: 1 !important; stroke-width: 3 !important; }
          .domain-region { transition: fill-opacity 0.3s; }
          .domain-region:hover { fill-opacity: 0.15; }
          .node-group, .edge-path, .domain-region {
            opacity: 0; animation: fadeIn 0.4s ease-out forwards;
          }
          @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
          }
          @keyframes dash-flow {
            to { stroke-dashoffset: -20; }
          }
        </style>
      </defs>

      <!-- ==================== REGIONS ==================== -->

      <!-- Core Architecture region (top center) -->
      <g class="domain-region" style="animation-delay: 0s;">
        <rect x="300" y="20" width="260" height="100" rx="16"
              fill="url(#grad-core)" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1.5"/>
        <line x1="355" y1="42" x2="395" y2="42" stroke="#ef4444" stroke-opacity="0.25" stroke-width="1"/>
        <text x="430" y="46" text-anchor="middle"
              fill="#ef4444" fill-opacity="0.8" font-size="11" font-weight="700" letter-spacing="2">ARCHITECTURE</text>
        <line x1="465" y1="42" x2="505" y2="42" stroke="#ef4444" stroke-opacity="0.25" stroke-width="1"/>
      </g>

      <!-- Frontend region (left middle) -->
      <g class="domain-region" style="animation-delay: 0.05s;">
        <rect x="30" y="180" width="200" height="100" rx="16"
              fill="url(#grad-frontend)" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1.5"/>
        <line x1="60" y1="202" x2="90" y2="202" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
        <text x="130" y="206" text-anchor="middle"
              fill="#6366f1" fill-opacity="0.8" font-size="11" font-weight="700" letter-spacing="2">FRONTEND</text>
        <line x1="170" y1="202" x2="200" y2="202" stroke="#6366f1" stroke-opacity="0.25" stroke-width="1"/>
      </g>

      <!-- Backend region (center middle) -->
      <g class="domain-region" style="animation-delay: 0.1s;">
        <rect x="280" y="180" width="280" height="100" rx="16"
              fill="url(#grad-backend)" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1.5"/>
        <line x1="345" y1="202" x2="385" y2="202" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1"/>
        <text x="420" y="206" text-anchor="middle"
              fill="#3b82f6" fill-opacity="0.8" font-size="11" font-weight="700" letter-spacing="2">BACKEND</text>
        <line x1="455" y1="202" x2="495" y2="202" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1"/>
      </g>

      <!-- Auth region (right middle) -->
      <g class="domain-region" style="animation-delay: 0.15s;">
        <rect x="610" y="180" width="190" height="100" rx="16"
              fill="url(#grad-auth)" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="1.5"/>
        <line x1="635" y1="202" x2="665" y2="202" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1"/>
        <text x="705" y="206" text-anchor="middle"
              fill="#f59e0b" fill-opacity="0.8" font-size="11" font-weight="700" letter-spacing="2">AUTH</text>
        <line x1="745" y1="202" x2="775" y2="202" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1"/>
      </g>

      <!-- Payments region (left bottom) -->
      <g class="domain-region" style="animation-delay: 0.2s;">
        <rect x="80" y="360" width="190" height="100" rx="16"
              fill="url(#grad-payments)" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="1.5"/>
        <line x1="105" y1="382" x2="135" y2="382" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1"/>
        <text x="175" y="386" text-anchor="middle"
              fill="#8b5cf6" fill-opacity="0.8" font-size="11" font-weight="700" letter-spacing="2">PAYMENTS</text>
        <line x1="215" y1="382" x2="245" y2="382" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1"/>
      </g>

      <!-- Infrastructure region (center-right bottom) -->
      <g class="domain-region" style="animation-delay: 0.25s;">
        <rect x="340" y="360" width="310" height="100" rx="16"
              fill="url(#grad-infra)" stroke="#10b981" stroke-opacity="0.2" stroke-width="1.5"/>
        <line x1="400" y1="382" x2="440" y2="382" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
        <text x="495" y="386" text-anchor="middle"
              fill="#10b981" fill-opacity="0.8" font-size="11" font-weight="700" letter-spacing="2">INFRASTRUCTURE</text>
        <line x1="550" y1="382" x2="590" y2="382" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
      </g>

      <!-- ==================== EDGES ==================== -->

      <!-- SaaS Platform -> Multi-tenancy (workflow, within core region) -->
      <path class="edge-path" data-from="saas-platform" data-to="multi-tenancy" data-type="workflow"
            d="M 390,87 C 400,87 410,87 420,87"
            stroke="#facc15" stroke-width="2" fill="none" opacity="0.8"
            marker-end="url(#arrow-workflow)"
            style="animation-delay: 0.5s; stroke-dasharray:8,4; animation: fadeIn 0.4s ease-out forwards, dash-flow 1.5s linear infinite;"/>

      <!-- Multi-tenancy -> Next.js (dependency: tenant-aware routing) -->
      <path class="edge-path" data-from="multi-tenancy" data-to="nextjs" data-type="dependency"
            d="M 470,100 C 400,140 200,140 130,180"
            stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" fill="none" opacity="0.6"
            marker-end="url(#arrow-dependency)"
            style="animation-delay: 0.55s;"/>
      <!-- Edge label: tenant routing -->
      <rect x="252" y="125" width="82" height="18" rx="9" fill="#0f0f1a" stroke="#ef444430" stroke-width="0.5"/>
      <text x="293" y="137" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="500" style="animation-delay:0.55s; opacity:0; animation: fadeIn 0.4s ease-out forwards;">테넌트 라우팅</text>

      <!-- Multi-tenancy -> FastAPI (dependency: tenant isolation) -->
      <path class="edge-path" data-from="multi-tenancy" data-to="fastapi" data-type="dependency"
            d="M 470,100 C 440,145 380,155 350,180"
            stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" fill="none" opacity="0.6"
            marker-end="url(#arrow-dependency)"
            style="animation-delay: 0.6s;"/>
      <!-- Edge label: tenant isolation -->
      <rect x="370" y="133" width="82" height="18" rx="9" fill="#0f0f1a" stroke="#ef444430" stroke-width="0.5"/>
      <text x="411" y="145" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="500" style="animation-delay:0.6s; opacity:0; animation: fadeIn 0.4s ease-out forwards;">테넌트 격리</text>

      <!-- Multi-tenancy -> Auth0 (dependency: tenant auth) -->
      <path class="edge-path" data-from="multi-tenancy" data-to="auth0" data-type="dependency"
            d="M 510,100 C 560,140 640,155 680,180"
            stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" fill="none" opacity="0.6"
            marker-end="url(#arrow-dependency)"
            style="animation-delay: 0.65s;"/>
      <!-- Edge label: tenant auth -->
      <rect x="567" y="125" width="72" height="18" rx="9" fill="#0f0f1a" stroke="#ef444430" stroke-width="0.5"/>
      <text x="603" y="137" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="500" style="animation-delay:0.65s; opacity:0; animation: fadeIn 0.4s ease-out forwards;">테넌트 인증</text>

      <!-- Next.js -> FastAPI (workflow: API calls) -->
      <path class="edge-path" data-from="nextjs" data-to="fastapi" data-type="workflow"
            d="M 230,240 C 260,240 280,240 300,240"
            stroke="#facc15" stroke-width="2" fill="none" opacity="0.8"
            marker-end="url(#arrow-workflow)"
            style="animation-delay: 0.7s; stroke-dasharray:8,4; animation: fadeIn 0.4s ease-out forwards, dash-flow 1.5s linear infinite;"/>
      <!-- Edge label -->
      <rect x="241" y="222" width="46" height="18" rx="9" fill="#0f0f1a" stroke="#facc1530" stroke-width="0.5"/>
      <text x="264" y="234" text-anchor="middle" fill="#facc15" font-size="9" font-weight="500" style="animation-delay:0.7s; opacity:0; animation: fadeIn 0.4s ease-out forwards;">API</text>

      <!-- FastAPI -> Redis (workflow: caching) -->
      <path class="edge-path" data-from="fastapi" data-to="redis" data-type="workflow"
            d="M 390,259 C 405,259 440,259 455,259"
            stroke="#facc15" stroke-width="2" fill="none" opacity="0.8"
            marker-end="url(#arrow-workflow)"
            style="animation-delay: 0.75s; stroke-dasharray:8,4; animation: fadeIn 0.4s ease-out forwards, dash-flow 1.5s linear infinite;"/>

      <!-- Next.js -> Auth0 (communication: token verification) -->
      <path class="edge-path" data-from="nextjs" data-to="auth0" data-type="communication"
            d="M 170,258 C 170,310 680,310 700,258"
            stroke="#38bdf8" stroke-width="1.8" stroke-dasharray="4,4" fill="none" opacity="0.6"
            marker-end="url(#arrow-communication)"
            style="animation-delay: 0.8s;"/>
      <!-- Edge label -->
      <rect x="397" y="302" width="68" height="18" rx="9" fill="#0f0f1a" stroke="#38bdf830" stroke-width="0.5"/>
      <text x="431" y="314" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="500" style="animation-delay:0.8s; opacity:0; animation: fadeIn 0.4s ease-out forwards;">토큰 검증</text>

      <!-- FastAPI -> Stripe (workflow: payment processing) -->
      <path class="edge-path" data-from="fastapi" data-to="stripe" data-type="workflow"
            d="M 340,259 C 300,310 210,330 175,360"
            stroke="#facc15" stroke-width="2" fill="none" opacity="0.8"
            marker-end="url(#arrow-workflow)"
            style="animation-delay: 0.85s; stroke-dasharray:8,4; animation: fadeIn 0.4s ease-out forwards, dash-flow 1.5s linear infinite;"/>
      <!-- Edge label -->
      <rect x="218" y="298" width="62" height="18" rx="9" fill="#0f0f1a" stroke="#facc1530" stroke-width="0.5"/>
      <text x="249" y="310" text-anchor="middle" fill="#facc15" font-size="9" font-weight="500" style="animation-delay:0.85s; opacity:0; animation: fadeIn 0.4s ease-out forwards;">결제 처리</text>

      <!-- FastAPI -> S3 (workflow: file storage) -->
      <path class="edge-path" data-from="fastapi" data-to="aws-s3" data-type="workflow"
            d="M 380,259 C 390,310 410,330 420,360"
            stroke="#facc15" stroke-width="2" fill="none" opacity="0.8"
            marker-end="url(#arrow-workflow)"
            style="animation-delay: 0.9s; stroke-dasharray:8,4; animation: fadeIn 0.4s ease-out forwards, dash-flow 1.5s linear infinite;"/>
      <!-- Edge label -->
      <rect x="367" y="323" width="72" height="18" rx="9" fill="#0f0f1a" stroke="#facc1530" stroke-width="0.5"/>
      <text x="403" y="335" text-anchor="middle" fill="#facc15" font-size="9" font-weight="500" style="animation-delay:0.9s; opacity:0; animation: fadeIn 0.4s ease-out forwards;">파일 저장</text>

      <!-- FastAPI -> ELK (communication: log shipping) -->
      <path class="edge-path" data-from="fastapi" data-to="elk" data-type="communication"
            d="M 420,259 C 480,310 540,340 570,360"
            stroke="#38bdf8" stroke-width="1.8" stroke-dasharray="4,4" fill="none" opacity="0.6"
            marker-end="url(#arrow-communication)"
            style="animation-delay: 0.95s;"/>
      <!-- Edge label -->
      <rect x="493" y="310" width="58" height="18" rx="9" fill="#0f0f1a" stroke="#38bdf830" stroke-width="0.5"/>
      <text x="522" y="322" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="500" style="animation-delay:0.95s; opacity:0; animation: fadeIn 0.4s ease-out forwards;">로그 수집</text>

      <!-- Auth0 -> FastAPI (communication: JWT validation) -->
      <path class="edge-path" data-from="auth0" data-to="fastapi" data-type="communication"
            d="M 640,240 C 580,240 530,240 490,240"
            stroke="#38bdf8" stroke-width="1.8" stroke-dasharray="4,4" fill="none" opacity="0.6"
            marker-end="url(#arrow-communication)"
            style="animation-delay: 1.0s;"/>
      <!-- Edge label -->
      <rect x="538" y="222" width="60" height="18" rx="9" fill="#0f0f1a" stroke="#38bdf830" stroke-width="0.5"/>
      <text x="568" y="234" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="500" style="animation-delay:1.0s; opacity:0; animation: fadeIn 0.4s ease-out forwards;">JWT</text>

      <!-- ==================== NODES ==================== -->

      <!-- SaaS Platform (core, decided) -->
      <g class="node-group" data-id="saas-platform" data-tooltip="SaaS 플랫폼 — 멀티테넌시 기반 서비스" data-status="decided"
         style="animation-delay: 0.3s;">
        <rect x="310" y="56" width="115" height="42" rx="8"
              fill="#1a1a2e" stroke="#ef4444" stroke-width="2.5"
              filter="url(#glow-core)"/>
        <rect x="310" y="56" width="115" height="4" rx="2" fill="#ef4444" fill-opacity="0.5"/>
        <circle cx="415" cy="66" r="4" fill="#4ade80"/>
        <circle cx="415" cy="66" r="4" fill="#4ade80" stroke="#4ade8040" stroke-width="2"/>
        <text x="367" y="80" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">SaaS 플랫폼</text>
      </g>

      <!-- Multi-tenancy (core, decided) -->
      <g class="node-group" data-id="multi-tenancy" data-tooltip="멀티테넌시 아키텍처 — 테넌트 격리 및 데이터 분리" data-status="decided"
         style="animation-delay: 0.35s;">
        <rect x="432" y="56" width="128" height="42" rx="8"
              fill="#1a1a2e" stroke="#ef4444" stroke-width="2.5"
              filter="url(#glow-core)"/>
        <rect x="432" y="56" width="128" height="4" rx="2" fill="#ef4444" fill-opacity="0.5"/>
        <circle cx="550" cy="66" r="4" fill="#4ade80"/>
        <circle cx="550" cy="66" r="4" fill="#4ade80" stroke="#4ade8040" stroke-width="2"/>
        <text x="496" y="80" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">멀티테넌시</text>
      </g>

      <!-- Next.js (core, decided) -->
      <g class="node-group" data-id="nextjs" data-tooltip="Next.js — 프론트엔드 프레임워크 (SSR/SSG)" data-status="decided"
         style="animation-delay: 0.4s;">
        <rect x="60" y="222" width="100" height="42" rx="8"
              fill="#1a1a2e" stroke="#6366f1" stroke-width="2.5"
              filter="url(#glow-frontend)"/>
        <rect x="60" y="222" width="100" height="4" rx="2" fill="#6366f1" fill-opacity="0.5"/>
        <circle cx="150" cy="232" r="4" fill="#4ade80"/>
        <circle cx="150" cy="232" r="4" fill="#4ade80" stroke="#4ade8040" stroke-width="2"/>
        <!-- Connection port dot -->
        <circle cx="160" cy="243" r="3" fill="#6366f1" fill-opacity="0.5"/>
        <text x="110" y="246" text-anchor="middle" dominant-baseline="central"
              fill="#e2e8f0" font-size="13" font-weight="bold">Next.js</text>
      </g>

      <!-- FastAPI (core, decided) -->
      <g class="node-group" data-id="fastapi" data-tooltip="FastAPI — 백엔드 API 서버 (Python, 비동기)" data-status="decided"

  <div class="meta">
    Last updated: 2026-04-05 · Planning Compass

  <script>
    const tooltip = document.querySelector('.concept-tooltip');
    const allEdges = document.querySelectorAll('.edge-path');
    const allNodes = document.querySelectorAll('.node-group');

    allNodes.forEach(node => {
      const nodeId = node.getAttribute('data-id');

      node.addEventListener('mouseenter', e => {
        const desc = node.getAttribute('data-tooltip');
        const status = node.getAttribute('data-status');
        const statusLabel = { decided: '결정됨', active: '논의 중', undecided: '미결정' }[status] || '';
        const statusColor = { decided: '#4ade80', active: '#facc15', undecided: '#6b7280' }[status] || '#6b7280';

        const connected = new Set();
        allEdges.forEach(edge => {
          const from = edge.getAttribute('data-from');
          const to = edge.getAttribute('data-to');
          if (from === nodeId || to === nodeId) {
            edge.classList.add('highlighted');
            edge.classList.remove('dimmed');
            connected.add(from); connected.add(to);
          } else {
            edge.classList.add('dimmed');
            edge.classList.remove('highlighted');
          }
        });

        allNodes.forEach(n => {
          const nId = n.getAttribute('data-id');
          n.style.opacity = connected.has(nId) || nId === nodeId ? '1' : '0.3';
        });

        let relText = '';
        allEdges.forEach(edge => {
          if (edge.getAttribute('data-from') === nodeId || edge.getAttribute('data-to') === nodeId) {
            const type = edge.getAttribute('data-type');
            const typeLabel = { workflow: '워크플로우', dependency: '의존성', communication: '통신' }[type] || type;
            const other = edge.getAttribute('data-from') === nodeId
              ? edge.getAttribute('data-to') : edge.getAttribute('data-from');
            relText += '<div>\u2192 ' + other + ' (' + typeLabel + ')</div>';
          }
        });

        tooltip.innerHTML =
          '<div style="font-weight:bold;margin-bottom:4px;">' + desc + '</div>' +
          '<span class="tt-status" style="background:' + statusColor + '20;color:' + statusColor + '">' + statusLabel + '</span>' +
          (relText ? '<div class="tt-relations">' + relText + '</div>' : '');
        tooltip.classList.add('visible');
      });

      node.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top = (e.clientY + 14) + 'px';
      });

      node.addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
        allEdges.forEach(edge => { edge.classList.remove('highlighted', 'dimmed'); });
        allNodes.forEach(n => { n.style.opacity = '1'; });
      });
    });
  </script>
