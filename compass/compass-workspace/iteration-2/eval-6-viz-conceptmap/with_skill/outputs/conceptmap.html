<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Compass — Concept Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
      min-height: 100vh;
    }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
    .meta { color: #666; font-size: 11px; margin-top: 24px; text-align: right; }

    .viz-container {
      overflow-x: auto;
      margin: 0 auto;
    }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: #1a1a2e;
      border-radius: 10px;
      border: 1px solid #2a2a4a;
      font-size: 12px;
      align-items: center;
    }
    .legend-title {
      font-weight: bold;
      color: #aaa;
      margin-right: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-swatch {
      width: 24px;
      height: 4px;
      border-radius: 2px;
    }
    .legend-swatch.dashed {
      background: repeating-linear-gradient(
        90deg,
        currentColor 0px, currentColor 6px,
        transparent 6px, transparent 12px
      );
      height: 3px;
    }
    .legend-node {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 2px solid;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: #1e1e36;
      color: #e2e8f0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      max-width: 280px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      border: 1px solid #3a3a5a;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 100;
    }
    #tooltip.visible { opacity: 1; }
  </style>
</head>
<body>
  <h1>Planning Compass — Concept Map</h1>
  <p class="subtitle">프리랜서 디자이너 SaaS 플랫폼 — 핵심 영역 간 관계와 의존성</p>

  <!-- Legend -->
  <div class="legend">
    <span class="legend-title">영역:</span>
    <span class="legend-item"><span class="legend-node" style="border-color: #818cf8; background: #818cf820;"></span> 포트폴리오</span>
    <span class="legend-item"><span class="legend-node" style="border-color: #34d399; background: #34d39920;"></span> 클라이언트 소통</span>
    <span class="legend-item"><span class="legend-node" style="border-color: #fbbf24; background: #fbbf2420;"></span> 견적/결제</span>
    <span class="legend-item"><span class="legend-node" style="border-color: #f87171; background: #f8717120;"></span> 공유 인프라</span>

    <span style="width: 1px; height: 20px; background: #333; margin: 0 4px;"></span>
    <span class="legend-title">연결:</span>
    <span class="legend-item"><span class="legend-swatch" style="background: #facc15;"></span> 워크플로우 (feeds)</span>
    <span class="legend-item"><span class="legend-swatch dashed" style="color: #f87171;"></span> 의존성 (depends-on)</span>
    <span class="legend-item"><span class="legend-swatch" style="background: #60a5fa;"></span> 데이터 연결 (links)</span>
  </div>

  <div class="viz-container">
    <svg id="conceptmap" width="100%" preserveAspectRatio="xMidYMid meet" viewBox="0 0 960 780">
      <defs>
        <!-- Glow filters for core nodes -->
        <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feFlood flood-color="#818cf8" flood-opacity="0.3" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="glow"/>
          <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feFlood flood-color="#34d399" flood-opacity="0.3" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="glow"/>
          <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-yellow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feFlood flood-color="#fbbf24" flood-opacity="0.3" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="glow"/>
          <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-red" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feFlood flood-color="#f87171" flood-opacity="0.3" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="glow"/>
          <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- Arrow markers -->
        <marker id="arrow-workflow" viewBox="0 0 10 7" refX="10" refY="3.5"
                markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <polygon points="0 0, 10 3.5, 0 7" fill="#facc15"/>
        </marker>
        <marker id="arrow-dep" viewBox="0 0 10 7" refX="10" refY="3.5"
                markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
        </marker>
        <marker id="arrow-link" viewBox="0 0 10 7" refX="10" refY="3.5"
                markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
        </marker>
      </defs>

      <!-- ============================================ -->
      <!-- REGION BACKGROUNDS                           -->
      <!-- ============================================ -->

      <!-- Portfolio region -->
      <rect x="20" y="20" width="290" height="320" rx="16"
            fill="#818cf808" stroke="#818cf830" stroke-width="1"/>
      <text x="36" y="48" fill="#818cf8" font-size="11" font-weight="bold" opacity="0.7">포트폴리오 관리 영역</text>

      <!-- Communication region -->
      <rect x="335" y="20" width="290" height="320" rx="16"
            fill="#34d39908" stroke="#34d39930" stroke-width="1"/>
      <text x="351" y="48" fill="#34d399" font-size="11" font-weight="bold" opacity="0.7">클라이언트 소통 영역</text>

      <!-- Invoice region -->
      <rect x="650" y="20" width="290" height="320" rx="16"
            fill="#fbbf2408" stroke="#fbbf2430" stroke-width="1"/>
      <text x="666" y="48" fill="#fbbf24" font-size="11" font-weight="bold" opacity="0.7">견적/결제 영역</text>

      <!-- Infrastructure region -->
      <rect x="20" y="530" width="920" height="220" rx="16"
            fill="#f8717108" stroke="#f8717130" stroke-width="1"/>
      <text x="36" y="558" fill="#f87171" font-size="11" font-weight="bold" opacity="0.7">공유 인프라 계층</text>

      <!-- ============================================ -->
      <!-- EDGES (drawn below nodes)                    -->
      <!-- ============================================ -->

      <!-- === Workflow edges (feeds): solid yellow curved arrows === -->
      <!-- 포트폴리오 → 클라이언트 소통 -->
      <path d="M 280,120 C 320,90 340,90 380,120"
            fill="none" stroke="#facc15" stroke-width="2" marker-end="url(#arrow-workflow)" opacity="0.7"/>
      <text x="330" y="88" fill="#facc15" font-size="9" text-anchor="middle" opacity="0.6">작업물 공유</text>

      <!-- 클라이언트 소통 → 견적서 발행 -->
      <path d="M 590,120 C 630,90 650,90 695,120"
            fill="none" stroke="#facc15" stroke-width="2" marker-end="url(#arrow-workflow)" opacity="0.7"/>
      <text x="643" y="88" fill="#facc15" font-size="9" text-anchor="middle" opacity="0.6">견적 요청</text>

      <!-- 견적서 발행 → 포트폴리오 (curved wrap) -->
      <path d="M 795,155 C 830,400 120,400 165,155"
            fill="none" stroke="#facc15" stroke-width="2" marker-end="url(#arrow-workflow)" opacity="0.5"/>
      <text x="480" y="420" fill="#facc15" font-size="9" text-anchor="middle" opacity="0.6">완료 → 포트폴리오 등록</text>

      <!-- === Dependency edges (depends-on): dashed red curves === -->
      <!-- 포트폴리오 관리 → 프로젝트 -->
      <path d="M 145,155 C 145,430 235,430 275,610"
            fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3"
            marker-end="url(#arrow-dep)" opacity="0.5"/>

      <!-- 포트폴리오 관리 → 파일 스토리지 -->
      <path d="M 185,155 C 200,440 460,440 495,610"
            fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3"
            marker-end="url(#arrow-dep)" opacity="0.5"/>

      <!-- 클라이언트 소통 → 프로젝트 -->
      <path d="M 460,155 C 430,430 310,430 290,610"
            fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3"
            marker-end="url(#arrow-dep)" opacity="0.5"/>

      <!-- 클라이언트 소통 → 클라이언트 DB -->
      <path d="M 500,155 C 520,460 680,460 695,610"
            fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3"
            marker-end="url(#arrow-dep)" opacity="0.5"/>

      <!-- 클라이언트 소통 → 알림 시스템 -->
      <path d="M 520,155 C 560,480 820,480 855,610"
            fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3"
            marker-end="url(#arrow-dep)" opacity="0.5"/>

      <!-- 견적서 발행 → 프로젝트 -->
      <path d="M 770,155 C 730,430 320,430 300,610"
            fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3"
            marker-end="url(#arrow-dep)" opacity="0.5"/>

      <!-- 견적서 발행 → 클라이언트 DB -->
      <path d="M 810,155 C 800,430 720,430 710,610"
            fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3"
            marker-end="url(#arrow-dep)" opacity="0.5"/>

      <!-- 파일 공유 → 파일 스토리지 -->
      <path d="M 408,290 C 408,500 490,500 500,610"
            fill="none" stroke="#f87171" stroke-width="1.2" stroke-dasharray="6,3"
            marker-end="url(#arrow-dep)" opacity="0.4"/>

      <!-- 피드백 수집 → 파일 스토리지 -->
      <path d="M 518,290 C 530,490 510,490 510,610"
            fill="none" stroke="#f87171" stroke-width="1.2" stroke-dasharray="6,3"
            marker-end="url(#arrow-dep)" opacity="0.4"/>

      <!-- 작업물 업로드 → 파일 스토리지 -->
      <path d="M 168,290 C 170,490 480,490 490,610"
            fill="none" stroke="#f87171" stroke-width="1.2" stroke-dasharray="6,3"
            marker-end="url(#arrow-dep)" opacity="0.4"/>

      <!-- 결제 연동 → 사용자 인증 -->
      <path d="M 760,290 C 700,490 120,490 105,610"
            fill="none" stroke="#f87171" stroke-width="1.2" stroke-dasharray="6,3"
            marker-end="url(#arrow-dep)" opacity="0.4"/>

      <!-- === Data link: 프로젝트 ↔ 클라이언트 DB === -->
      <path d="M 340,640 L 640,640"
            fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-link)" opacity="0.6"/>
      <text x="490" y="632" fill="#60a5fa" font-size="9" text-anchor="middle" opacity="0.7">1:N 연결</text>

      <!-- ============================================ -->
      <!-- CORE NODES (3 pillars)                       -->
      <!-- ============================================ -->

      <!-- 포트폴리오 관리: text=8chars => (8*8)+40=104, use 140 for padding -->
      <g class="node" data-tooltip="포트폴리오 관리&#10;&#10;디자이너의 작업물을 체계적으로 관리하고&#10;외부에 공개하는 핵심 기능 영역.&#10;&#10;하위: 프로젝트 갤러리, 작업물 업로드,&#10;공개 페이지, 커스텀 도메인&#10;&#10;상태: 미결정 (MVP 범위에 따라)">
        <rect x="95" y="80" width="140" height="48" rx="10"
              fill="#1a1a2e" stroke="#818cf8" stroke-width="2.5" filter="url(#glow-purple)"/>
        <text x="165" y="109" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">포트폴리오 관리</text>
      </g>

      <!-- 클라이언트 소통: text=7chars => (7*8)+40=96, use 140 -->
      <g class="node" data-tooltip="클라이언트 소통&#10;&#10;프로젝트 진행 중 클라이언트와의&#10;커뮤니케이션을 담당하는 핵심 영역.&#10;&#10;하위: 메시지/채팅, 피드백 수집,&#10;파일 공유, 진행 상태 공유&#10;&#10;상태: 미결정">
        <rect x="410" y="80" width="140" height="48" rx="10"
              fill="#1a1a2e" stroke="#34d399" stroke-width="2.5" filter="url(#glow-green)"/>
        <text x="480" y="109" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">클라이언트 소통</text>
      </g>

      <!-- 견적서 발행: text=5chars => (5*8)+40=80, use 120 -->
      <g class="node" data-tooltip="견적서 발행&#10;&#10;견적서·청구서 작성부터 결제까지의&#10;비즈니스 거래 흐름을 관리.&#10;&#10;하위: 견적서 생성, 청구서 발행,&#10;결제 연동, 계약서 관리&#10;&#10;상태: 미결정">
        <rect x="735" y="80" width="120" height="48" rx="10"
              fill="#1a1a2e" stroke="#fbbf24" stroke-width="2.5" filter="url(#glow-yellow)"/>
        <text x="795" y="109" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">견적서 발행</text>
      </g>

      <!-- ============================================ -->
      <!-- SUB-NODES: Portfolio group                   -->
      <!-- ============================================ -->
      <!-- Row 1: 프로젝트 갤러리 (6*8+40=88), 작업물 업로드 (6*8+40=88) -->
      <!-- x1=36, w1=100; x2=36+100+16=152, w2=100 -->
      <g class="node" data-tooltip="프로젝트 갤러리&#10;&#10;완료된 프로젝트를 카테고리별로&#10;정리·전시하는 기능.&#10;포트폴리오의 핵심 UI.">
        <rect x="36" y="170" width="120" height="36" rx="8"
              fill="#1a1a2e" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="96" y="193" text-anchor="middle" fill="#c4b5fd" font-size="11">프로젝트 갤러리</text>
      </g>

      <g class="node" data-tooltip="작업물 업로드&#10;&#10;이미지·PDF·영상 등 디자인 산출물&#10;업로드 및 버전 관리.&#10;파일 스토리지에 의존.">
        <rect x="172" y="170" width="120" height="36" rx="8"
              fill="#1a1a2e" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="232" y="193" text-anchor="middle" fill="#c4b5fd" font-size="11">작업물 업로드</text>
      </g>

      <!-- Row 2: 공개 포트폴리오 페이지 (9*8+40=112), 커스텀 도메인 (6*8+40=88) -->
      <!-- x1=36, w1=130; x2=36+130+16=182, w2=110 -->
      <g class="node" data-tooltip="공개 포트폴리오 페이지&#10;&#10;외부 클라이언트에게 공유하는&#10;퍼블릭 포트폴리오 웹페이지.&#10;신규 클라이언트 유입 경로.">
        <rect x="36" y="222" width="140" height="36" rx="8"
              fill="#1a1a2e" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="106" y="245" text-anchor="middle" fill="#c4b5fd" font-size="11">공개 포트폴리오 페이지</text>
      </g>

      <g class="node" data-tooltip="커스텀 도메인&#10;&#10;디자이너 고유 도메인(예: design.me)&#10;연결 기능. 프리미엄 기능 후보.">
        <rect x="192" y="222" width="104" height="36" rx="8"
              fill="#1a1a2e" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="244" y="245" text-anchor="middle" fill="#c4b5fd" font-size="11">커스텀 도메인</text>
      </g>

      <!-- ============================================ -->
      <!-- SUB-NODES: Communication group               -->
      <!-- ============================================ -->
      <!-- Row 1: 메시지/채팅 (6*8+40=88), 피드백 수집 (5*8+40=80) -->
      <g class="node" data-tooltip="메시지/채팅&#10;&#10;클라이언트와 실시간 또는 비동기&#10;메시지를 주고받는 기능.&#10;알림 시스템 연동 필요.">
        <rect x="351" y="170" width="104" height="36" rx="8"
              fill="#1a1a2e" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="403" y="193" text-anchor="middle" fill="#6ee7b7" font-size="11">메시지/채팅</text>
      </g>

      <g class="node" data-tooltip="피드백 수집&#10;&#10;시안에 대한 클라이언트 코멘트/마크업&#10;수집. 파일 위 직접 피드백 가능.&#10;파일 스토리지 의존.">
        <rect x="471" y="170" width="96" height="36" rx="8"
              fill="#1a1a2e" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="519" y="193" text-anchor="middle" fill="#6ee7b7" font-size="11">피드백 수집</text>
      </g>

      <!-- Row 2: 파일 공유 (4*8+40=72), 프로젝트 진행 상태 (8*8+40=104) -->
      <g class="node" data-tooltip="파일 공유&#10;&#10;클라이언트에게 작업 파일을&#10;안전하게 전달하는 기능.&#10;파일 스토리지 의존.">
        <rect x="351" y="222" width="96" height="36" rx="8"
              fill="#1a1a2e" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="399" y="245" text-anchor="middle" fill="#6ee7b7" font-size="11">파일 공유</text>
      </g>

      <g class="node" data-tooltip="프로젝트 진행 상태&#10;&#10;프로젝트 마일스톤/단계를&#10;클라이언트와 공유하는 대시보드.&#10;투명성 확보.">
        <rect x="463" y="222" width="140" height="36" rx="8"
              fill="#1a1a2e" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="533" y="245" text-anchor="middle" fill="#6ee7b7" font-size="11">프로젝트 진행 상태</text>
      </g>

      <!-- ============================================ -->
      <!-- SUB-NODES: Invoice group                     -->
      <!-- ============================================ -->
      <!-- Row 1: 견적서 생성 (5*8+40=80), 청구서 발행 (5*8+40=80) -->
      <g class="node" data-tooltip="견적서 생성&#10;&#10;프로젝트 요구사항에 맞는&#10;견적서 템플릿 작성 및 발송.&#10;클라이언트 DB 연동.">
        <rect x="666" y="170" width="96" height="36" rx="8"
              fill="#1a1a2e" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="714" y="193" text-anchor="middle" fill="#fde68a" font-size="11">견적서 생성</text>

  <div id="tooltip"></div>

  <script>
    // Tooltip handler
    const tooltip = document.getElementById('tooltip');
    const nodes = document.querySelectorAll('.node[data-tooltip]');

    nodes.forEach(node => {
      node.style.cursor = 'pointer';

      node.addEventListener('mouseenter', (e) => {
        const text = node.getAttribute('data-tooltip');
        tooltip.innerHTML = text.replace(/\n/g, '<br>');
        tooltip.classList.add('visible');
      });

      node.addEventListener('mousemove', (e) => {
        const pad = 16;
        let x = e.clientX + pad;
        let y = e.clientY + pad;

        // Keep tooltip within viewport
        const rect = tooltip.getBoundingClientRect();
        if (x + rect.width > window.innerWidth - pad) {
          x = e.clientX - rect.width - pad;
        }
        if (y + rect.height > window.innerHeight - pad) {
          y = e.clientY - rect.height - pad;
        }

        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
      });

      node.addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
      });
    });

    // Hover highlight effect on nodes
    nodes.forEach(node => {
      const rect = node.querySelector('rect');
      if (!rect) return;
      const origOpacity = rect.getAttribute('opacity') || '1';

      node.addEventListener('mouseenter', () => {
        rect.style.filter = 'brightness(1.3)';
        rect.style.transition = 'filter 0.15s';
      });
      node.addEventListener('mouseleave', () => {
        rect.style.filter = '';
      });
    });
  </script>
